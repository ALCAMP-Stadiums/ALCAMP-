<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>النظام المحاسبي</title>
<style>
:root {
  color-scheme: light only;
  --primary: #166534;
  --primary-light: #16a34a;
  --primary-bg: #f0fdf4;
  --sidebar-bg: #14532d;
  --accent: #22c55e;
  --text-dark: #1f2937;
  --text-gray: #6b7280;
  --border: #e5e7eb;
  --white: #ffffff;
  --danger: #ef4444;
  --warning: #f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#f3f4f6!important;color:#1f2937!important}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#f3f4f6!important;color:var(--text-dark);direction:rtl}
/* Force light mode - override browser dark mode */
@media(prefers-color-scheme:dark){
  html,body{background:#f3f4f6!important;color:#1f2937!important}
  .card,.modal,.sidebar,.topbar,.ai-messages,.ai-input-area,.stat-card,table,input,select,textarea{background-color:inherit!important;color:inherit!important}
}
a{text-decoration:none;color:inherit}
input,select,textarea,button{font-family:inherit;font-size:14px}
.hidden{display:none!important}

/* SIDEBAR */
.sidebar{position:fixed;top:0;right:0;width:260px;height:100vh;background:var(--sidebar-bg);color:#fff;z-index:100;overflow-y:auto;transition:transform .3s}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sidebar-logo .logo-icon{width:38px;height:38px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.sidebar-logo .logo-text{font-size:16px;font-weight:600}
.sidebar-logo .logo-sub{font-size:11px;color:rgba(255,255,255,.6)}
.sidebar-nav{padding:12px 0}
.nav-section{padding:8px 16px 4px;font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .2s;border-radius:0}
.nav-item:hover{background:rgba(255,255,255,.1)}
.nav-item.active{background:var(--primary-light);border-right:3px solid var(--accent)}
.nav-item .nav-icon{font-size:18px;width:24px;text-align:center}
.nav-item .nav-label{font-size:14px}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.user-name{font-size:13px;font-weight:600}
.user-role{font-size:11px;color:rgba(255,255,255,.6)}
.btn-logout{margin-top:10px;width:100%;padding:8px;background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid rgba(239,68,68,.3);border-radius:6px;cursor:pointer;font-size:13px}
.btn-logout:hover{background:rgba(239,68,68,.35)}

/* TOPBAR */
.topbar{position:fixed;top:0;right:260px;left:0;height:56px;background:#fff;border-bottom:1px solid var(--border);z-index:99;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.topbar-title{font-size:18px;font-weight:600;color:var(--primary)}
.topbar-right{display:flex;align-items:center;gap:10px}
.hamburger{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--primary)}

/* MAIN */
.main-content{margin-right:260px;margin-top:56px;padding:24px;min-height:calc(100vh - 56px)}

/* CARDS */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:20px;margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:16px;font-weight:600;color:var(--primary)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:10px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-right:4px solid var(--accent)}
.stat-label{font-size:12px;color:var(--text-gray);margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700;color:var(--primary)}
.stat-icon{font-size:28px;margin-bottom:8px}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary-light);color:#fff}
.btn-primary:hover{background:var(--primary)}
.btn-secondary{background:#fff;color:var(--primary);border:1px solid var(--primary-light)}
.btn-secondary:hover{background:var(--primary-bg)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-warning{background:var(--warning);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:5px 8px;font-size:14px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* TABLES */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:var(--primary-bg);color:var(--primary);font-weight:600;padding:10px 12px;text-align:right;border-bottom:2px solid var(--accent);white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:hover{background:#f9fafb}
tbody tr:nth-child(even){background:#fafafa}
tbody tr:nth-child(even):hover{background:#f3f4f6}
.td-num{font-weight:600;color:var(--primary);font-variant-numeric:tabular-nums}
.td-pos{color:#16a34a;font-weight:600}
.td-neg{color:var(--danger);font-weight:600}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:13px;font-weight:500;color:var(--text-dark)}
.form-control{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;color:var(--text-dark);background:#fff;outline:none;transition:border .2s}
.form-control:focus{border-color:var(--primary-light);box-shadow:0 0 0 2px rgba(22,163,74,.15)}
.form-control.error{border-color:var(--danger)}
.form-error{font-size:11px;color:var(--danger)}
textarea.form-control{resize:vertical;min-height:70px}

/* TABS */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;cursor:pointer;font-size:14px;color:var(--text-gray);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary-light);font-weight:600}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:600;color:var(--primary)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-gray);padding:4px 8px;border-radius:4px}
.modal-close:hover{background:#f3f4f6;color:var(--danger)}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.modal-lg{max-width:860px}

/* BADGES */
.badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:#dcfce7;color:#166534}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-yellow{background:#fef9c3;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-purple{background:#ede9fe;color:#5b21b6}
.badge-gray{background:#f3f4f6;color:#374151}

/* SEARCH */
.search-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.search-input{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;width:220px;outline:none}
.search-input:focus{border-color:var(--primary-light)}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#14532d,#166534,#16a34a)}
.login-card{background:#fff;border-radius:14px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .logo-icon{width:64px;height:64px;background:var(--primary-light);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:30px;color:#fff;margin-bottom:12px}
.login-logo h1{font-size:22px;font-weight:700;color:var(--primary)}
.login-logo p{font-size:13px;color:var(--text-gray);margin-top:4px}
.login-form .form-group{margin-bottom:14px}
.login-btn{width:100%;padding:12px;background:var(--primary-light);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s}
.login-btn:hover{background:var(--primary)}
.login-error{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:6px;font-size:13px;margin-top:10px;border:1px solid #fecaca}

/* JOURNAL LINES */
.journal-lines-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.journal-lines-table th{background:var(--primary-bg);padding:8px;text-align:right;color:var(--primary);font-weight:600}
.journal-lines-table td{padding:6px 4px;border-bottom:1px solid var(--border)}
.journal-lines-table input{width:100%;padding:5px;border:1px solid var(--border);border-radius:4px;font-size:13px}
.balance-indicator{padding:8px 14px;border-radius:6px;font-size:13px;font-weight:600;margin-top:8px;display:inline-block}
.balance-ok{background:#dcfce7;color:#166534}
.balance-err{background:#fee2e2;color:#991b1b}

/* RESPONSIVE */
@media(max-width:900px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .sidebar{transform:translateX(100%)}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-right:0}
  .topbar{right:0}
  .hamburger{display:block}
  .stat-grid{grid-template-columns:1fr 1fr}
}

/* PRINT */
@media print{
  .sidebar,.topbar,.no-print{display:none!important}
  .main-content{margin:0!important;padding:10px!important}
  body{background:#fff}
  table{width:100%;border-collapse:collapse}
  th,td{border:1px solid #000;padding:6px;font-size:11px}
  .card{box-shadow:none;border:1px solid #ccc}
  .btn{display:none!important}
  .tabs{display:none!important}
}

/* OVERLAY */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.sidebar-overlay.open{display:block}

/* EXTRA */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-title{font-size:20px;font-weight:700;color:var(--primary)}
.empty-state{text-align:center;padding:40px;color:var(--text-gray)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.text-right{text-align:right}
.text-center{text-align:center}
.mt-10{margin-top:10px}
.gap-8{gap:8px}
.flex{display:flex}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.flex-wrap{flex-wrap:wrap}
.font-bold{font-weight:700}
.text-green{color:#16a34a}
.text-red{color:#ef4444}
.text-sm{font-size:12px}
.commission-preview{background:var(--primary-bg);border:1px solid var(--accent);border-radius:8px;padding:12px;margin-top:10px;text-align:center;font-size:16px;font-weight:700;color:var(--primary)}

/* ========== AI ASSISTANT ========== */
#aiBtn{position:fixed;bottom:24px;left:24px;width:54px;height:54px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:50%;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.5);z-index:300;font-size:22px;transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center}
#aiBtn:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(124,58,237,.6)}
#aiBtn .ai-badge{position:absolute;top:-4px;left:-4px;width:18px;height:18px;background:#ef4444;border-radius:50%;font-size:10px;color:#fff;display:none;align-items:center;justify-content:center;font-weight:700}
#aiPanel{position:fixed;bottom:88px;left:24px;width:370px;height:520px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.2);z-index:300;display:none;flex-direction:column;overflow:hidden;border:1px solid #e5e7eb}
#aiPanel.open{display:flex}
.ai-header{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ai-header-left{display:flex;align-items:center;gap:10px}
.ai-avatar{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.ai-title{font-size:15px;font-weight:700}
.ai-subtitle{font-size:11px;opacity:.8}
.ai-header-btns{display:flex;gap:6px}
.ai-icon-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.ai-icon-btn:hover{background:rgba(255,255,255,.3)}
.ai-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;background:#f8f9fa}
.ai-msg{max-width:88%;display:flex;flex-direction:column;gap:4px}
.ai-msg.user{align-self:flex-end;align-items:flex-end}
.ai-msg.bot{align-self:flex-start;align-items:flex-start}
.ai-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5}
.ai-msg.user .ai-bubble{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border-bottom-right-radius:3px}
.ai-msg.bot .ai-bubble{background:#fff;color:#1f2937;border:1px solid #e5e7eb;border-bottom-left-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ai-msg-time{font-size:10px;color:#9ca3af}
.ai-confirm-card{background:#fff;border:2px solid #7c3aed;border-radius:10px;padding:12px;margin-top:6px;font-size:12px;width:100%}
.ai-confirm-title{font-weight:700;color:#7c3aed;margin-bottom:8px;font-size:13px}
.ai-confirm-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.ai-confirm-row:last-of-type{border:none}
.ai-confirm-btns{display:flex;gap:8px;margin-top:10px}
.ai-confirm-btn{flex:1;padding:7px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.ai-confirm-btn.ok{background:#7c3aed;color:#fff}
.ai-confirm-btn.ok:hover{background:#6d28d9}
.ai-confirm-btn.cancel{background:#f3f4f6;color:#374151}
.ai-confirm-btn.cancel:hover{background:#e5e7eb}
.ai-input-area{padding:12px;border-top:1px solid #e5e7eb;background:#fff;flex-shrink:0}
.ai-input-row{display:flex;gap:8px;align-items:flex-end}
.ai-input{flex:1;padding:9px 12px;border:1px solid #d1d5db;border-radius:20px;font-size:13px;outline:none;resize:none;max-height:80px;font-family:inherit;direction:rtl}
.ai-input:focus{border-color:#7c3aed;box-shadow:0 0 0 2px rgba(124,58,237,.15)}
.ai-send-btn{width:36px;height:36px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:50%;cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-send-btn:hover{background:#6d28d9}
.ai-send-btn:disabled{opacity:.4;cursor:not-allowed}
.ai-typing{display:flex;gap:4px;align-items:center;padding:8px 14px}
.ai-dot{width:7px;height:7px;background:#9ca3af;border-radius:50%;animation:aiDot 1.2s infinite}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes aiDot{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.1);opacity:1}}
.ai-key-setup{padding:20px;text-align:center}
.ai-key-setup p{font-size:13px;color:#6b7280;margin-bottom:14px;line-height:1.6}
.ai-key-input{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;margin-bottom:10px;direction:ltr}
.ai-key-input:focus{border-color:#7c3aed}
.ai-key-btn{width:100%;padding:10px;background:#7c3aed;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.ai-key-btn:hover{background:#6d28d9}
.ai-suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px 0;flex-shrink:0}
.ai-suggestion{background:#ede9fe;color:#7c3aed;border:none;border-radius:14px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:inherit}
.ai-suggestion:hover{background:#ddd6fe}
@media(max-width:640px){
  #aiPanel{width:calc(100vw - 32px);left:16px;bottom:80px}
  #aiBtn{left:16px;bottom:16px}
}
</style>
</head>
<body>

<div id="app"></div>

<!-- AI Assistant -->
<button id="aiBtn" onclick="toggleAI()" title="المساعد الذكي">
  🤖
  <span class="ai-badge" id="aiBadge"></span>
</button>
<div id="aiPanel">
  <div class="ai-header">
    <div class="ai-header-left">
      <div class="ai-avatar">🤖</div>
      <div>
        <div class="ai-title">المساعد الذكي</div>
        <div class="ai-subtitle">مدعوم بـ Claude AI</div>
      </div>
    </div>
    <div class="ai-header-btns">
      <button class="ai-icon-btn" onclick="showAISettings()" title="إعدادات">⚙️</button>
      <button class="ai-icon-btn" onclick="clearAIChat()" title="محادثة جديدة">🗑️</button>
      <button class="ai-icon-btn" onclick="toggleAI()" title="إغلاق">✕</button>
    </div>
  </div>
  <div id="aiMessages" class="ai-messages"></div>
  <div class="ai-suggestions" id="aiSuggestions">
    <button class="ai-suggestion" onclick="useAISuggestion(this)">استلمنا مبلغ من عميل</button>
    <button class="ai-suggestion" onclick="useAISuggestion(this)">دفعنا لمورد</button>
    <button class="ai-suggestion" onclick="useAISuggestion(this)">مصروف من الخزينة</button>
    <button class="ai-suggestion" onclick="useAISuggestion(this)">تحويل مصرفي</button>
  </div>
  <div class="ai-input-area">
    <div class="ai-input-row">
      <textarea id="aiInput" class="ai-input" rows="1" placeholder="اكتب العملية بكلامك العادي..." onkeydown="aiInputKeydown(event)" oninput="autoResizeAI(this)"></textarea>
      <button id="aiSendBtn" class="ai-send-btn" onclick="sendAIMessage()">➤</button>
    </div>
  </div>
</div>

<script>
// ==================== STORAGE KEYS ====================
const KEYS = {
  users: 'acc_users',
  session: 'acc_session',
  company: 'acc_company',
  contacts: 'acc_contacts',
  contactTxns: 'acc_contact_txns',
  cashTxns: 'acc_cash_txns',
  bankTxns: 'acc_bank_txns',
  commissions: 'acc_commissions',
  journalEntries: 'acc_journal_entries',
  journalLines: 'acc_journal_lines'
};

// ==================== STORAGE HELPERS ====================
function load(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function save(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}
function loadObj(key) {
  try { return JSON.parse(localStorage.getItem(key)) || {}; } catch { return {}; }
}
function saveObj(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

// ==================== SEED DATA ====================
function initData() {
  if (localStorage.getItem('acc_initialized')) return;

  // Simple hash: just store plain passwords, compare on login
  save(KEYS.users, [
    {id:1, username:'admin', password:'admin123', fullName:'مدير النظام', role:'ADMIN'},
    {id:2, username:'accountant', password:'acc123', fullName:'المحاسب', role:'ACCOUNTANT'},
    {id:3, username:'viewer', password:'view123', fullName:'مشاهد', role:'VIEWER'}
  ]);

  save(KEYS.contacts, [
    {id:1, name:'الشحومي', phone:'0911310111', type:'CUSTOMER', openingBalance:-1152, notes:''},
    {id:2, name:'المصدر', phone:'0910940276', type:'CUSTOMER', openingBalance:-3785, notes:''},
    {id:3, name:'العالمية', phone:'0912609217', type:'CUSTOMER', openingBalance:-7987, notes:''},
    {id:4, name:'شركة كندة الموردة', phone:'', type:'SUPPLIER', openingBalance:41947, notes:''},

function getSession() {
  const s = loadObj(KEYS.session);
  if (!s.userId) return null;
  if (s.expiry && Date.now() > s.expiry) { localStorage.removeItem(KEYS.session); return null; }
  return s;
}
function setSession(user) {
  saveObj(KEYS.session, {
    userId: user.id, username: user.username,
    fullName: user.fullName, role: user.role,
    expiry: Date.now() + 8 * 60 * 60 * 1000
  });
}
function clearSession() { localStorage.removeItem(KEYS.session); }
function requireSession() {
  const s = getSession();
  if (!s) { window.location.hash = '#login'; return null; }
  return s;
}
function canEdit() {
  const s = getSession();
  return s && (s.role === 'ADMIN' || s.role === 'ACCOUNTANT');
}
function isAdmin() {
  const s = getSession();
  return s && s.role === 'ADMIN';
}

// ==================== UTILS ====================
function fmtNum(n) {
  if (n === null || n === undefined || n === '') return '0.00';
  return Number(n).toLocaleString('ar-LY', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  if (parts.length === 3) return parts[2]+'/'+parts[1]+'/'+parts[0];
  return d;
}
function today() {
  return new Date().toISOString().split('T')[0];
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function genId() { return Date.now() + Math.floor(Math.random()*1000); }
function contactTypeBadge(type) {
  const map = {CUSTOMER:'badge-green', SUPPLIER:'badge-blue', SALES_REP:'badge-yellow', PARTNER:'badge-purple'};
  const labels = {CUSTOMER:'عميل', SUPPLIER:'مورد', SALES_REP:'مندوب', PARTNER:'شريك'};
  return `<span class="badge ${map[type]||'badge-gray'}">${labels[type]||type}</span>`;
}
function roleBadge(role) {
  const map = {ADMIN:'badge-red', ACCOUNTANT:'badge-blue', VIEWER:'badge-gray'};
  const labels = {ADMIN:'مدير', ACCOUNTANT:'محاسب', VIEWER:'مشاهد'};
  return `<span class="badge ${map[role]||'badge-gray'}">${labels[role]||role}</span>`;
}

// ==================== BALANCE CALCS ====================
function recalcCashBalances() {
  let txns = load(KEYS.cashTxns);
  txns.sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  let bal = 0;
  txns = txns.map(t => {
    bal += (Number(t.amountIn)||0) - (Number(t.amountOut)||0);
    return {...t, balance: bal};
  });
  save(KEYS.cashTxns, txns);
  return txns;
}
function recalcBankBalances() {
  let txns = load(KEYS.bankTxns);
  txns.sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  let bal = 0;
  txns = txns.map(t => {
    bal += (Number(t.amountIn)||0) - (Number(t.amountOut)||0);
    return {...t, balance: bal};
  });
  save(KEYS.bankTxns, txns);
  return txns;
}
function recalcContactTxns(contactId) {
  const contact = load(KEYS.contacts).find(c=>c.id==contactId);
  if (!contact) return [];
  let txns = load(KEYS.contactTxns).filter(t=>t.contactId==contactId);
  txns.sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  let bal = Number(contact.openingBalance)||0;
  txns = txns.map(t => {
    bal += (Number(t.debit)||0) - (Number(t.credit)||0);
    return {...t, balance: bal};
  });
  // update in storage
  const all = load(KEYS.contactTxns).filter(t=>t.contactId!=contactId);
  save(KEYS.contactTxns, [...all, ...txns]);
  return txns;
}
function getContactBalance(contactId) {
  const contact = load(KEYS.contacts).find(c=>c.id==contactId);
  if (!contact) return 0;
  const txns = load(KEYS.contactTxns).filter(t=>t.contactId==contactId);
  let bal = Number(contact.openingBalance)||0;
  txns.forEach(t => { bal += (Number(t.debit)||0) - (Number(t.credit)||0); });
  return bal;
}
function getCashBalance() {
  const txns = load(KEYS.cashTxns);
  if (!txns.length) return 0;
  const sorted = [...txns].sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  let bal = 0;
  sorted.forEach(t => { bal += (Number(t.amountIn)||0) - (Number(t.amountOut)||0); });
  return bal;
}
function getBankBalance() {
  const txns = load(KEYS.bankTxns);
  if (!txns.length) return 0;
  const sorted = [...txns].sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  let bal = 0;
  sorted.forEach(t => { bal += (Number(t.amountIn)||0) - (Number(t.amountOut)||0); });
  return bal;
}
function getTotalCommissions() {
  return load(KEYS.commissions).reduce((s,c)=>s+(Number(c.commission)||0),0);
}
function getTotalDebtors() {
  const contacts = load(KEYS.contacts);
  let total = 0;
  contacts.filter(c=>c.type==='CUSTOMER').forEach(c => {
    const b = getContactBalance(c.id);
    if (b > 0) total += b;
  });
  return total;
}

function saveCashBankTxn(type, id) {
  const date = document.getElementById('cbDate').value;
  const desc = document.getElementById('cbDesc').value.trim();
  const ref = document.getElementById('cbRef').value.trim();
  const amtType = document.getElementById('cbAmtType').value;
  const amt = parseFloat(document.getElementById('cbAmt').value)||0;
  const notes = document.getElementById('cbNotes').value.trim();
  if (!date||!desc||amt<=0) { alert('يرجى تعبئة الحقول المطلوبة'); return; }
  const key = type==='cash'?KEYS.cashTxns:KEYS.bankTxns;
  let txns = load(key);
  if (id) {
    txns = txns.map(t=>t.id==id?{...t,date,description:desc,reference:ref,amountIn:amtType==='in'?amt:0,amountOut:amtType==='out'?amt:0,notes}:t);
  } else {
    txns.push({id:genId(),date,description:desc,reference:ref,amountIn:amtType==='in'?amt:0,amountOut:amtType==='out'?amt:0,balance:0,notes,createdAt:Date.now()});
  }
  save(key, txns);
  if (type==='cash') recalcCashBalances(); else recalcBankBalances();
  closeCbModal();
  const pc = document.getElementById('pageContent');
  if (pc) { pc.innerHTML = renderCashBank(type); }
}

function deleteCashBankTxn(type, id) {
  if (!confirm('هل تريد حذف هذه المعاملة؟')) return;
  const key = type==='cash'?KEYS.cashTxns:KEYS.bankTxns;
  save(key, load(key).filter(t=>t.id!=id));
  if (type==='cash') recalcCashBalances(); else recalcBankBalances();
  const pc = document.getElementById('pageContent');
  if (pc) { pc.innerHTML = renderCashBank(type); }
}

            const total = entLines.reduce((s,l)=>s+(Number(l.debit)||0),0);
            const typeMap = {PURCHASE:'badge-blue',SALE:'badge-green',EXPENSE:'badge-red',OTHER:'badge-gray'};
            const typeLabel = {PURCHASE:'مشتريات',SALE:'مبيعات',EXPENSE:'مصروفات',OTHER:'أخرى'};

              <td>${i+1}</td>

}

function attachJournalEvents() {}

let journalLineCount = 0;

  const entries = load(KEYS.journalEntries);
  const allLines = load(KEYS.journalLines);
  const e = id ? entries.find(x=>x.id==id) : null;
  const eLines = e ? allLines.filter(l=>l.entryId==e.id) : [{id:'new0',accountName:'',description:'',debit:0,credit:0},{id:'new1',accountName:'',description:'',debit:0,credit:0}];

  const linesHtml = eLines.map((l,i)=>journalLineRow(i,l)).join('');

  const html = `
  <div class="modal-overlay" id="journalModal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title">${e?'تعديل قيد':'إضافة قيد محاسبي'}</div>
        <button class="modal-close" onclick="closeJournalModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid" style="margin-bottom:16px">
          <div class="form-group">
            <label class="form-label">رقم القيد *</label>
            <input type="text" id="jEntryNum" class="form-control" value="${esc(e?e.entryNumber:'JE-'+Date.now().toString().slice(-6))}">
          </div>
          <div class="form-group">
            <label class="form-label">التاريخ *</label>
            <input type="date" id="jDate" class="form-control" value="${e?e.date:today()}">
          </div>
          <div class="form-group">
            <label class="form-label">النوع</label>
            <select id="jType" class="form-control">
              <option value="OTHER" ${(!e||e.type==='OTHER')?'selected':''}>أخرى</option>
              <option value="PURCHASE" ${e&&e.type==='PURCHASE'?'selected':''}>مشتريات</option>
              <option value="SALE" ${e&&e.type==='SALE'?'selected':''}>مبيعات</option>
              <option value="EXPENSE" ${e&&e.type==='EXPENSE'?'selected':''}>مصروفات</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">المرجع</label>
            <input type="text" id="jRef" class="form-control" value="${esc(e?e.reference:'')}">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">الوصف *</label>
            <input type="text" id="jDesc" class="form-control" value="${esc(e?e.description:'')}">
          </div>
        </div>
        <div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
          <strong style="color:var(--primary)">سطور القيد</strong>
          <button class="btn btn-secondary btn-sm" onclick="addJournalLine()">+ سطر</button>
        </div>
        <table class="journal-lines-table">
          <thead><tr><th>الحساب</th><th>البيان</th><th>مدين</th><th>دائن</th><th></th></tr></thead>
          <tbody id="journalLinesBody">${linesHtml}</tbody>
        </table>
        <div id="jBalanceIndicator" style="margin-top:10px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeJournalModal()">إلغاء</button>
        <button class="btn btn-primary" id="jSaveBtn" onclick="saveJournalEntry(${id||'null'})">حفظ</button>
      </div>
    </div>
  </div>`;
  document.getElementById('journalModalContainer').innerHTML = html;
  updateJournalBalance();
}

function journalLineRow(i, l) {
  return `<tr id="jline_${i}">
    <td><input type="text" class="jAccount" value="${esc(l.accountName)}" oninput="updateJournalBalance()" placeholder="اسم الحساب"></td>
    <td><input type="text" class="jLineDesc" value="${esc(l.description)}" placeholder="بيان"></td>
    <td><input type="number" class="jDebit" value="${l.debit||''}" min="0" step="0.01" oninput="updateJournalBalance()" placeholder="0"></td>
    <td><input type="number" class="jCredit" value="${l.credit||''}" min="0" step="0.01" oninput="updateJournalBalance()" placeholder="0"></td>
    <td><button class="btn btn-danger btn-sm" onclick="removeJournalLine(${i})">✕</button></td>
  </tr>`;
}

function addJournalLine() {
  const tbody = document.getElementById('journalLinesBody');
  const i = journalLineCount++;
  const row = document.createElement('tr');
  row.id = 'jline_'+i;
  row.innerHTML = `
    <td><input type="text" class="jAccount" oninput="updateJournalBalance()" placeholder="اسم الحساب"></td>
    <td><input type="text" class="jLineDesc" placeholder="بيان"></td>
    <td><input type="number" class="jDebit" min="0" step="0.01" oninput="updateJournalBalance()" placeholder="0"></td>
    <td><input type="number" class="jCredit" min="0" step="0.01" oninput="updateJournalBalance()" placeholder="0"></td>
    <td><button class="btn btn-danger btn-sm" onclick="removeJournalLine(${i})">✕</button></td>`;
  tbody.appendChild(row);
  updateJournalBalance();
}

function removeJournalLine(i) {
  const row = document.getElementById('jline_'+i);
  if (row) row.remove();
  updateJournalBalance();
}

function updateJournalBalance() {
  const debits = [...document.querySelectorAll('.jDebit')].reduce((s,el)=>s+(parseFloat(el.value)||0),0);
  const credits = [...document.querySelectorAll('.jCredit')].reduce((s,el)=>s+(parseFloat(el.value)||0),0);
  const diff = Math.abs(debits - credits);
  const el = document.getElementById('jBalanceIndicator');
  const saveBtn = document.getElementById('jSaveBtn');
  if (!el) return;
  if (diff < 0.001) {
    el.innerHTML = `<span class="balance-indicator balance-ok">✓ القيد متوازن: ${fmtNum(debits)}</span>`;
    if (saveBtn) saveBtn.disabled = false;
  } else {
    el.innerHTML = `<span class="balance-indicator balance-err">✗ الفرق: ${fmtNum(diff)} (المدين: ${fmtNum(debits)} | الدائن: ${fmtNum(credits)})</span>`;
    if (saveBtn) saveBtn.disabled = true;
  }
}

function closeJournalModal() {
  const m = document.getElementById('journalModal');
  if (m) m.remove();
}

function saveJournalEntry(id) {
  const entryNumber = document.getElementById('jEntryNum').value.trim();
  const date = document.getElementById('jDate').value;
  const type = document.getElementById('jType').value;
  const reference = document.getElementById('jRef').value.trim();
  const description = document.getElementById('jDesc').value.trim();
  if (!entryNumber||!date||!description) { alert('يرجى تعبئة الحقول المطلوبة'); return; }

  const accounts = [...document.querySelectorAll('.jAccount')].map(el=>el.value);
  const descs = [...document.querySelectorAll('.jLineDesc')].map(el=>el.value);
  const debits = [...document.querySelectorAll('.jDebit')].map(el=>parseFloat(el.value)||0);
  const credits = [...document.querySelectorAll('.jCredit')].map(el=>parseFloat(el.value)||0);
  const totalDeb = debits.reduce((s,v)=>s+v,0);
  const totalCred = credits.reduce((s,v)=>s+v,0);
  if (Math.abs(totalDeb-totalCred)>0.001) { alert('القيد غير متوازن'); return; }

  let entries = load(KEYS.journalEntries);
  let allLines = load(KEYS.journalLines);
  const entryId = id || genId();

  if (id) {
    entries = entries.map(e=>e.id==id?{...e,entryNumber,date,type,reference,description}:e);
    allLines = allLines.filter(l=>l.entryId!=id);
  } else {
    entries.push({id:entryId,entryNumber,date,type,reference,description});
  }

  accounts.forEach((acc,i)=>{
    if (acc||debits[i]||credits[i]) {
      allLines.push({id:genId(),entryId:entryId,accountName:acc,description:descs[i],debit:debits[i],credit:credits[i]});
    }
  });

  save(KEYS.journalEntries, entries);
  save(KEYS.journalLines, allLines);
  closeJournalModal();
  document.getElementById('pageContent').innerHTML = renderJournal();
}

          <div style="grid-column:1/-1"><strong>الوصف:</strong> ${esc(e.description)}</div>
        </div>
        <table>
          <thead><tr><th>الحساب</th><th>البيان</th><th>مدين</th><th>دائن</th></tr></thead>
          <tbody>
            ${lines.map(l=>`<tr>
              <td>${esc(l.accountName)}</td>
              <td>${esc(l.description)}</td>
              <td class="td-pos">${l.debit>0?fmtNum(l.debit):''}</td>
              <td class="td-neg">${l.credit>0?fmtNum(l.credit):''}</td>
            </tr>`).join('')}
            <tr style="background:var(--primary-bg);font-weight:700">
              <td colspan="2">الإجمالي</td>
              <td class="td-pos">${fmtNum(totalDeb)}</td>

          </tbody>

      <div class="modal-footer">

function closeJournalDetail() {

function deleteJournalEntry(id) {
  if (!confirm('هل تريد حذف هذا القيد؟')) return;
  save(KEYS.journalEntries, load(KEYS.journalEntries).filter(e=>e.id!=id));
  save(KEYS.journalLines, load(KEYS.journalLines).filter(l=>l.entryId!=id));
  document.getElementById('pageContent').innerHTML = renderJournal();
}

function renderReports(activeTab='pnl') {
  return `
  <div class="page-header">
    <div class="page-title">التقارير</div>
    <button class="btn btn-secondary no-print" onclick="window.print()">🖨️ طباعة</button>
  </div>
  <div class="card">
    <div class="tabs">
      <div class="tab ${activeTab==='pnl'?'active':''}" onclick="switchReport('pnl')">قائمة الأرباح والخسائر</div>
      <div class="tab ${activeTab==='ledger'?'active':''}" onclick="switchReport('ledger')">دفتر الأستاذ</div>
      <div class="tab ${activeTab==='summary'?'active':''}" onclick="switchReport('summary')">ملخص الحسابات</div>
    </div>
    <div id="reportContent">
      ${renderReportContent(activeTab)}
    </div>
  </div>`;
}

function switchReport(tab) {
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('reportContent').innerHTML = renderReportContent(tab);
  attachReportContentEvents(tab);
}

function renderReportContent(tab) {
  if (tab==='pnl') return renderPnL();
  if (tab==='ledger') return renderGeneralLedger();
  if (tab==='summary') return renderAccountSummary();
  return '';
}

function attachReportContentEvents(tab) {
  if (tab==='pnl') {
    document.getElementById('pnlFrom')?.addEventListener('change', updatePnL);
    document.getElementById('pnlTo')?.addEventListener('change', updatePnL);
  }
  if (tab==='ledger') {
    document.getElementById('ledgerContact')?.addEventListener('change', updateLedgerReport);
  }
}

function renderPnL(from='', to='') {
  const fromDate = from || new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0];
  const toDate = to || today();

  const entries = load(KEYS.journalEntries);
  const lines = load(KEYS.journalLines);

  function sumByType(type) {
    return entries.filter(e=>e.type===type&&e.date>=fromDate&&e.date<=toDate)
      .reduce((s,e)=>{
        const eLines = lines.filter(l=>l.entryId==e.id);
        return s + eLines.reduce((ss,l)=>ss+(Number(l.debit)||0),0);
      },0);
  }

  const totalSales = sumByType('SALE');
  const totalPurch = sumByType('PURCHASE');
  const totalExp = sumByType('EXPENSE');
  const totalComm = load(KEYS.commissions).filter(c=>c.date>=fromDate&&c.date<=toDate)
    .reduce((s,c)=>s+(Number(c.commission)||0),0);
  const grossProfit = totalSales - totalPurch;
  const netProfit = grossProfit - totalExp + totalComm;

  return `
  <div style="margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
    <div class="form-group">
      <label class="form-label">من تاريخ</label>
      <input type="date" id="pnlFrom" class="form-control" value="${fromDate}" onchange="updatePnL()">
    </div>
    <div class="form-group">
      <label class="form-label">إلى تاريخ</label>
      <input type="date" id="pnlTo" class="form-control" value="${toDate}" onchange="updatePnL()">
    </div>
  </div>
  <div id="pnlResult">
    ${renderPnLTable(totalSales, totalPurch, totalExp, totalComm, grossProfit, netProfit)}
  </div>`;
}

function renderPnLTable(sales, purch, exp, comm, gross, net) {
  return `<table>
    <thead><tr><th>البند</th><th>المبلغ</th></tr></thead>
    <tbody>
      <tr><td>إجمالي المبيعات</td><td class="td-pos">${fmtNum(sales)}</td></tr>
      <tr><td>إجمالي المشتريات</td><td class="td-neg">${fmtNum(purch)}</td></tr>
      <tr style="background:var(--primary-bg);font-weight:600"><td>مجمل الربح</td><td class="${gross>=0?'td-pos':'td-neg'}">${fmtNum(gross)}</td></tr>
      <tr><td>إجمالي المصروفات</td><td class="td-neg">${fmtNum(exp)}</td></tr>
      <tr><td>إجمالي العمولات</td><td class="td-pos">${fmtNum(comm)}</td></tr>
      <tr style="background:#dcfce7;font-weight:700;font-size:15px"><td>صافي الربح</td><td class="${net>=0?'td-pos':'td-neg'}">${fmtNum(net)}</td></tr>
    </tbody>
  </table>`;
}

function updatePnL() {
  const from = document.getElementById('pnlFrom').value;
  const to = document.getElementById('pnlTo').value;
  document.getElementById('reportContent').innerHTML = renderPnL(from, to);
}

function renderGeneralLedger(contactId='') {
  const contacts = load(KEYS.contacts);
  let html = `
  <div style="margin-bottom:16px">
    <div class="form-group" style="display:inline-block;width:260px">
      <label class="form-label">فلتر حسب جهة الاتصال</label>
      <select id="ledgerContact" class="form-control" onchange="updateLedgerReport()">
        <option value="">كل جهات الاتصال</option>
        ${contacts.map(c=>`<option value="${c.id}" ${contactId==c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
      </select>
    </div>
  </div>`;

  const filtered = contactId ? contacts.filter(c=>c.id==contactId) : contacts;

  filtered.forEach(c => {
    const txns = recalcContactTxns(c.id);
    if (!txns.length) return;
    html += `<div style="margin-bottom:20px">
      <h3 style="color:var(--primary);margin-bottom:8px">${esc(c.name)} ${contactTypeBadge(c.type)}</h3>
      <table>
        <thead><tr><th>التاريخ</th><th>رقم الفاتورة</th><th>البيان</th><th>مدين</th><th>دائن</th><th>الرصيد</th></tr></thead>
        <tbody>
          <tr style="background:var(--primary-bg)">
            <td colspan="5" style="font-weight:600">رصيد أول المدة</td>
            <td class="td-num">${fmtNum(c.openingBalance)}</td>
          </tr>
          ${txns.map(t=>`<tr>
            <td>${fmtDate(t.date)}</td>
            <td>${esc(t.invoiceNumber)}</td>
            <td>${esc(t.description)}</td>
            <td class="td-pos">${t.debit>0?fmtNum(t.debit):''}</td>
            <td class="td-neg">${t.credit>0?fmtNum(t.credit):''}</td>
            <td class="td-num">${fmtNum(t.balance)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  });

  return html;
}

function updateLedgerReport() {
  const contactId = document.getElementById('ledgerContact').value;
  document.getElementById('reportContent').innerHTML = renderGeneralLedger(contactId);
}

function renderAccountSummary() {
  const contacts = load(KEYS.contacts);
  const groups = {CUSTOMER:'عملاء',SUPPLIER:'موردون',SALES_REP:'مناديب',PARTNER:'شركاء'};
  let html = '';

  Object.entries(groups).forEach(([type, label]) => {
    const group = contacts.filter(c=>c.type===type);
    if (!group.length) return;
    let total = 0;
    html += `<div style="margin-bottom:20px">
      <h3 style="color:var(--primary);margin-bottom:8px">${label}</h3>
      <table>
        <thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>الرصيد</th></tr></thead>
        <tbody>
          ${group.map((c,i)=>{
            const bal = getContactBalance(c.id);
            total += bal;
            return `<tr>
              <td>${i+1}</td>
              <td>${esc(c.name)}</td>
              <td dir="ltr">${esc(c.phone)||'—'}</td>
              <td class="${bal>=0?'td-pos':'td-neg'}">${fmtNum(bal)}</td>
            </tr>`;
          }).join('')}
          <tr style="background:var(--primary-bg);font-weight:700">
            <td colspan="3">الإجمالي</td>
            <td class="${total>=0?'td-pos':'td-neg'}">${fmtNum(total)}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
  });

  return html || '<div class="empty-state"><div class="empty-icon">📊</div><p>لا توجد بيانات</p></div>';
}

function attachReportsEvents() {
  document.getElementById('pnlFrom')?.addEventListener('change', updatePnL);
  document.getElementById('pnlTo')?.addEventListener('change', updatePnL);
}

          <div class="form-group">
            <label class="form-label">الاسم الكامل *</label>
            <input type="text" id="uFullName" class="form-control" value="${esc(u?u.fullName:'')}">
          </div>
          <div class="form-group">
            <label class="form-label">${u?'كلمة المرور الجديدة':'كلمة المرور *'}</label>
            <input type="password" id="uPass" class="form-control" placeholder="${u?'اتركه فارغاً للإبقاء':''}">
          </div>
          <div class="form-group">
            <label class="form-label">الدور *</label>
            <select id="uRole" class="form-control">
              <option value="VIEWER" ${(!u||u.role==='VIEWER')?'selected':''}>مشاهد</option>
              <option value="ACCOUNTANT" ${u&&u.role==='ACCOUNTANT'?'selected':''}>محاسب</option>
              <option value="ADMIN" ${u&&u.role==='ADMIN'?'selected':''}>مدير</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeUserModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveUser(${id||'null'})">حفظ</button>
      </div>
    </div>
  </div>`;
  document.getElementById('userModalContainer').innerHTML = html;
}

function closeUserModal() {
  const m = document.getElementById('userModal');
  if (m) m.remove();
}

function saveUser(id) {
  const username = document.getElementById('uUsername').value.trim();
  const fullName = document.getElementById('uFullName').value.trim();
  const pass = document.getElementById('uPass').value;
  const role = document.getElementById('uRole').value;
  if (!username||!fullName) { alert('يرجى تعبئة الحقول المطلوبة'); return; }
  let users = load(KEYS.users);
  if (id) {
    users = users.map(u=>u.id==id?{...u,fullName,role,...(pass?{password:pass}:{})}:u);
  } else {
    if (!pass) { alert('كلمة المرور مطلوبة'); return; }
    if (users.find(u=>u.username===username)) { alert('اسم المستخدم موجود مسبقاً'); return; }
    users.push({id:genId(),username,fullName,password:pass,role});
  }
  save(KEYS.users, users);
  closeUserModal();
  document.getElementById('pageContent').innerHTML = renderUsers();
}

function deleteUser(id) {
  if (!confirm('هل تريد حذف هذا المستخدم؟')) return;
  save(KEYS.users, load(KEYS.users).filter(u=>u.id!=id));
  document.getElementById('pageContent').innerHTML = renderUsers();
}

// ==================== AI ASSISTANT ====================
const AI_KEY = 'acc_ai_api_key';
const AI_HISTORY_KEY = 'acc_ai_history';

const AI_SYSTEM = `أنت مساعد محاسبي ذكي لنظام محاسبة اسمه "النظام المحاسبي". تتحدث العربية بطلاقة.

النظام يحتوي على:
1. الخزينة (cash): نقدي وارد/صادر
2. المصرف (bank): تحويلات مصرفية وارد/صادر
3. جهات الاتصال بأنواعها: عملاء CUSTOMER، موردون SUPPLIER، مناديب SALES_REP، شركاء PARTNER
4. عمولات المناديب: عمولة = سعر بيع - سعر شراء
5. قيود محاسبية: قيود مزدوجة مدين ودائن

قوائم جهات الاتصال الموجودة: {{CONTACTS}}

عند وصف عملية مالية، أرجع JSON فقط بهذا الشكل:
{
  "intent": "transaction",
  "module": "cash" | "bank" | "contact" | "commission",
  "fields": {
    "date": "YYYY-MM-DD أو null",
    "description": "البيان",
    "contactId": رقم_جهة_الاتصال_أو_null,
    "contactName": "اسم_الجهة_أو_null",
    "amountIn": رقم_أو_0,
    "amountOut": رقم_أو_0,
    "reference": "مرجع_أو_فارغ",
    "invoiceNumber": "رقم_فاتورة_أو_فارغ",
    "debit": رقم_أو_0,
    "credit": رقم_أو_0,
    "salePrice": رقم_أو_0,
    "purchasePrice": رقم_أو_0,
    "notes": ""
  },
  "summary": "جملة قصيرة تلخص ما ستسجله"
}

للمحادثة العادية أو الأسئلة العامة أو إذا الطلب غير واضح أرجع:
{
  "intent": "chat",
  "reply": "الجواب هنا"
}

قواعد:
- إذا ذكر "استلمنا" أو "دفع لنا" أو "حصلنا" → amountIn للخزينة أو المصرف أو credit للعميل
- إذا ذكر "دفعنا" أو "سحبنا" أو "مصروف" → amountOut أو debit
- إذا ذكر "عميل" أو اسم عميل → module: "contact"
- إذا ذكر "مصرف" أو "تحويل" → module: "bank"
- إذا ذكر "خزينة" أو "نقد" أو "كاش" → module: "cash"
- التاريخ "اليوم" = {{TODAY}}
- أرجع JSON فقط بدون أي نص إضافي عند intent=transaction`;

let aiChatHistory = [];
let aiPending = null;

function getAIKey() { return localStorage.getItem(AI_KEY) || ''; }
function setAIKey(k) { localStorage.setItem(AI_KEY, k.trim()); }

function toggleAI() {
  const panel = document.getElementById('aiPanel');
  const isOpen = panel.classList.toggle('open');
  if (isOpen && aiChatHistory.length === 0) {
    renderAIMessages();
    addAIBotMsg('مرحباً! أنا مساعدك المحاسبي 🤖\n\nيمكنك إخباري بأي عملية مالية بكلامك العادي وسأسجلها في المكان الصحيح تلقائياً.\n\nمثال: "استلمنا 5000 من الشحومي اليوم"');
  }
  if (isOpen && !getAIKey()) showAISettings();
}

function showAISettings() {
  const cur = getAIKey();
  const msgs = document.getElementById('aiMessages');
  msgs.innerHTML = `
    <div class="ai-key-setup">
      <div style="font-size:36px;margin-bottom:12px">🔑</div>
      <p>لاستخدام المساعد الذكي تحتاج <strong>API Key</strong> من Anthropic.<br>
      احصل عليه مجاناً من <strong>console.anthropic.com</strong></p>
      <input type="password" class="ai-key-input" id="aiKeyInput" value="${esc(cur)}" placeholder="sk-ant-..." dir="ltr">
      <button class="ai-key-btn" onclick="saveAIKey()">حفظ وتفعيل</button>
      ${cur ? `<button class="ai-key-btn" style="background:#6b7280;margin-top:8px" onclick="renderAIMessages()">رجوع</button>` : ''}
    </div>`;
}

function saveAIKey() {
  const val = document.getElementById('aiKeyInput').value.trim();
  if (!val.startsWith('sk-')) { alert('المفتاح غير صحيح، يبدأ بـ sk-'); return; }
  setAIKey(val);
  renderAIMessages();
  if (aiChatHistory.length === 0) {
    addAIBotMsg('تم تفعيل المساعد الذكي! ✅\n\nجرب الآن: "استلمنا 3000 من الشحومي اليوم"');
  }
}

function clearAIChat() {
  if (!confirm('مسح سجل المحادثة؟')) return;
  aiChatHistory = [];
  renderAIMessages();
  addAIBotMsg('محادثة جديدة! كيف يمكنني مساعدتك؟');
}

function renderAIMessages() {
  const msgs = document.getElementById('aiMessages');
  if (!msgs) return;
  msgs.innerHTML = aiChatHistory.map((m, i) => renderAIMsg(m, i)).join('');
  msgs.scrollTop = msgs.scrollHeight;
}

function renderAIMsg(m, i) {
  const time = m.time ? `<div class="ai-msg-time">${m.time}</div>` : '';
  if (m.role === 'user') {
    return `<div class="ai-msg user"><div class="ai-bubble">${esc(m.text)}</div>${time}</div>`;
  }
  if (m.type === 'confirm') {
    return `<div class="ai-msg bot">
      <div class="ai-bubble">${m.text}</div>
      <div class="ai-confirm-card">
        <div class="ai-confirm-title">📋 تأكيد العملية</div>
        ${m.rows.map(r=>`<div class="ai-confirm-row"><span>${r[0]}</span><span><strong>${r[1]}</strong></span></div>`).join('')}
        ${!m.done ? `<div class="ai-confirm-btns">
          <button class="ai-confirm-btn ok" onclick="confirmAI(${i})">✓ تسجيل</button>
          <button class="ai-confirm-btn cancel" onclick="cancelAI(${i})">✕ إلغاء</button>
        </div>` : `<div style="text-align:center;color:#16a34a;font-weight:700;margin-top:8px">${m.done}</div>`}
      </div>
      ${time}
    </div>`;
  }
  return `<div class="ai-msg bot"><div class="ai-bubble" style="white-space:pre-wrap">${esc(m.text)}</div>${time}</div>`;
}

function addAIBotMsg(text) {
  const t = new Date().toLocaleTimeString('ar-LY', {hour:'2-digit',minute:'2-digit'});
  aiChatHistory.push({role:'bot', text, time:t});
  renderAIMessages();
}

function addAITyping() {
  const msgs = document.getElementById('aiMessages');
  const div = document.createElement('div');
  div.className = 'ai-msg bot';
  div.id = 'aiTyping';
  div.innerHTML = `<div class="ai-bubble" style="padding:8px 14px"><div class="ai-typing"><span class="ai-dot"></span><span class="ai-dot"></span><span class="ai-dot"></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeAITyping() {
  const t = document.getElementById('aiTyping');
  if (t) t.remove();
}

function autoResizeAI(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

function aiInputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAIMessage(); }
}

function useAISuggestion(btn) {
  const inp = document.getElementById('aiInput');
  if (inp) { inp.value = btn.textContent; inp.focus(); }
}

async function sendAIMessage() {
  const inp = document.getElementById('aiInput');
  const text = inp.value.trim();
  if (!text) return;
  if (!getAIKey()) { showAISettings(); return; }

  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('aiSendBtn').disabled = true;

  const t = new Date().toLocaleTimeString('ar-LY', {hour:'2-digit',minute:'2-digit'});
  aiChatHistory.push({role:'user', text, time:t});
  renderAIMessages();
  addAITyping();

  try {
    const contacts = load(KEYS.contacts);
    const contactsList = contacts.map(c=>`${c.id}: ${c.name} (${c.type})`).join(', ');
    const sysPrompt = AI_SYSTEM.replace('{{CONTACTS}}', contactsList).replace('{{TODAY}}', today());

    const msgs = aiChatHistory
      .filter(m => m.role === 'user' || (m.role === 'bot' && m.type !== 'confirm'))
      .slice(-8)
      .map(m => ({role: m.role === 'user' ? 'user' : 'assistant', content: m.text}));

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getAIKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        system: sysPrompt,
        messages: msgs
      })
    });

    removeAITyping();

    if (!resp.ok) {
      const err = await resp.json().catch(()=>({error:{message:'خطأ في الاتصال'}}));
      if (resp.status === 401) addAIBotMsg('❌ المفتاح غير صحيح. اضغط ⚙️ لتغييره.');
      else addAIBotMsg('❌ خطأ: ' + (err.error?.message || resp.status));
      return;
    }

    const data = await resp.json();
    const raw = data.content[0].text.trim();

    let parsed;
    try {
      const jsonStr = raw.match(/\{[\s\S]*\}/)?.[0] || raw;
      parsed = JSON.parse(jsonStr);
    } catch {
      addAIBotMsg(raw);
      return;
    }

    if (parsed.intent === 'chat') {
      addAIBotMsg(parsed.reply || raw);
      return;
    }

    if (parsed.intent === 'transaction') {
      handleAITransaction(parsed);
    } else {
      addAIBotMsg(raw);
    }

  } catch(e) {
    removeAITyping();
    addAIBotMsg('❌ تعذر الاتصال بالذكاء الاصطناعي. تحقق من اتصال الإنترنت.');
    console.error(e);
  } finally {
    document.getElementById('aiSendBtn').disabled = false;
  }
}

function handleAITransaction(parsed) {
  const f = parsed.fields || {};
  const module = parsed.module;
  const t = new Date().toLocaleTimeString('ar-LY', {hour:'2-digit',minute:'2-digit'});

  // Build display rows
  const rows = [];
  const moduleLabels = {cash:'الخزينة 💰', bank:'المصرف 🏦', contact:'كشف حساب 👤', commission:'العمولات 📊'};
  rows.push(['القسم', moduleLabels[module] || module]);
  if (f.date) rows.push(['التاريخ', fmtDate(f.date)]);
  if (f.description) rows.push(['البيان', f.description]);
  if (f.invoiceNumber) rows.push(['رقم الفاتورة', f.invoiceNumber]);
  if (f.contactName || f.contactId) {
    const c = f.contactId ? load(KEYS.contacts).find(x=>x.id==f.contactId) : null;
    rows.push(['الجهة', c ? c.name : (f.contactName || '-')]);
  }
  if (module === 'cash' || module === 'bank') {
    if (f.amountIn) rows.push(['وارد', fmtNum(f.amountIn)]);
    if (f.amountOut) rows.push(['صادر', fmtNum(f.amountOut)]);
  }
  if (module === 'contact') {
    if (f.debit || f.credit) {
      rows.push(['مدين', fmtNum(f.debit||0)]);
      rows.push(['دائن', fmtNum(f.credit||0)]);
    } else if (f.amountIn || f.amountOut) {
      rows.push(['مدين', fmtNum(f.amountIn||0)]);
      rows.push(['دائن', fmtNum(f.amountOut||0)]);
    }
  }
  if (module === 'commission') {
    if (f.salePrice) rows.push(['سعر البيع', fmtNum(f.salePrice)]);
    if (f.purchasePrice) rows.push(['سعر الشراء', fmtNum(f.purchasePrice)]);
    rows.push(['العمولة', fmtNum((f.salePrice||0)-(f.purchasePrice||0))]);
  }

  const msgIdx = aiChatHistory.length;
  aiChatHistory.push({
    role: 'bot', type: 'confirm', time: t,
    text: parsed.summary || 'هل تريد تسجيل هذه العملية؟',
    rows, parsed, done: null
  });
  renderAIMessages();
  aiPending = {idx: msgIdx, parsed};
}

function confirmAI(idx) {
  const msg = aiChatHistory[idx];
  if (!msg || msg.done) return;
  const p = msg.parsed;
  const f = p.fields || {};

  try {
    const date = f.date || today();
    if (p.module === 'cash') {
      let txns = load(KEYS.cashTxns);
      txns.push({id:genId(), date, description:f.description||'قيد من المساعد', reference:f.reference||'', amountIn:Number(f.amountIn)||0, amountOut:Number(f.amountOut)||0, balance:0, notes:f.notes||'', createdAt:Date.now()});
      save(KEYS.cashTxns, txns);
      recalcCashBalances();
    } else if (p.module === 'bank') {
      let txns = load(KEYS.bankTxns);
      txns.push({id:genId(), date, description:f.description||'قيد من المساعد', reference:f.reference||'', amountIn:Number(f.amountIn)||0, amountOut:Number(f.amountOut)||0, balance:0, notes:f.notes||'', createdAt:Date.now()});
      save(KEYS.bankTxns, txns);
      recalcBankBalances();
    } else if (p.module === 'contact') {
      let contactId = f.contactId;
      if (!contactId && f.contactName) {
        const c = load(KEYS.contacts).find(x=>x.name.includes(f.contactName)||f.contactName.includes(x.name));
        if (c) contactId = c.id;
      }
      if (!contactId) { msg.done = '❌ لم يتم العثور على جهة الاتصال'; renderAIMessages(); return; }
      let txns = load(KEYS.contactTxns);
      txns.push({id:genId(), contactId, date, invoiceNumber:f.invoiceNumber||'', description:f.description||'قيد من المساعد', debit:Number(f.debit||f.amountIn)||0, credit:Number(f.credit||f.amountOut)||0, balance:0, notes:f.notes||'', createdAt:Date.now()});
      save(KEYS.contactTxns, txns);
      recalcContactTxns(contactId);
    } else if (p.module === 'commission') {
      let reps = load(KEYS.commissions);
      const sal = Number(f.salePrice)||0, pur = Number(f.purchasePrice)||0;
      let salesRepId = f.contactId;
      if (!salesRepId && f.contactName) {
        const c = load(KEYS.contacts).find(x=>x.type==='SALES_REP'&&(x.name.includes(f.contactName)||f.contactName.includes(x.name)));
        if (c) salesRepId = c.id;
      }
      const repName = salesRepId ? (load(KEYS.contacts).find(x=>x.id==salesRepId)||{}).name||f.contactName||'' : f.contactName||'';
      reps.push({id:genId(), salesRepId, salesRepName:repName, invoiceNumber:f.invoiceNumber||'', date, description:f.description||'عمولة', salePrice:sal, purchasePrice:pur, commission:sal-pur, notes:f.notes||''});
      save(KEYS.commissions, reps);
    }
    msg.done = '✅ تم التسجيل بنجاح!';
    // Refresh current page if relevant
    const {page} = getPage();
    const pc = document.getElementById('pageContent');
    if (pc && ['cash','bank','contacts','contact-ledger','commissions'].includes(page)) {
      renderPage(page, {});
    }
  } catch(e) {
    msg.done = '❌ خطأ أثناء الحفظ: ' + e.message;
  }
  renderAIMessages();
}

function cancelAI(idx) {
  aiChatHistory[idx].done = '↩️ تم الإلغاء';
  renderAIMessages();
}
