<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ALCAMP - رموز التحقق</title>
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ALCAMP OTP">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Cairo,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}
.header{background:#1e293b;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #22c55e;}
.header h1{font-size:18px;color:#22c55e;}
.status{display:flex;align-items:center;gap:6px;font-size:12px;}
.dot{width:10px;height:10px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite;}
.dot.off{background:#ef4444;animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.empty{text-align:center;padding:60px 20px;color:#64748b;}
.empty i{font-size:48px;margin-bottom:16px;}
.list{padding:16px;}
.card{background:#1e293b;border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid #334155;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.card.new{border-color:#22c55e;box-shadow:0 0 20px rgba(34,197,94,.2);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.name{font-size:16px;font-weight:700;color:#f1f5f9;}
.time{font-size:11px;color:#64748b;}
.phone{font-size:13px;color:#94a3b8;margin-bottom:10px;}
.otp-box{background:#0f172a;border-radius:10px;padding:14px;text-align:center;margin-bottom:14px;}
.otp-label{font-size:11px;color:#64748b;margin-bottom:6px;}
.otp-code{font-size:36px;font-weight:700;color:#22c55e;letter-spacing:8px;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#25d366;color:#fff;border:none;border-radius:12px;padding:12px;width:100%;font-family:Cairo,sans-serif;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;}
.wa-btn:active{opacity:.8;}
.del-btn{background:none;border:none;color:#ef4444;font-size:13px;cursor:pointer;padding:4px 8px;}
.notify-btn{display:block;width:calc(100%-32px);margin:16px;background:#3b82f6;color:#fff;border:none;border-radius:12px;padding:14px;font-family:Cairo,sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.notify-btn:active{opacity:.8;}
</style>
</head>
<body>

<div class="header">
  <h1>🏟️ رموز التحقق</h1>
  <div class="status">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-txt">متصل</span>
  </div>
</div>

<button class="notify-btn" id="notif-btn" onclick="enableNotif()">🔔 تفعيل الإشعارات</button>

<div class="list" id="list">
  <div class="empty">
    <div style="font-size:48px;margin-bottom:16px;">📭</div>
    <p>لا توجد طلبات بعد</p>
    <p style="font-size:12px;margin-top:8px;color:#475569;">ستظهر هنا فور طلب أي زبون رمز التحقق</p>
  </div>
</div>

<script>
const SUPA_URL='https://waqkjsdpbgxiraoigusn.supabase.co';
const SUPA_KEY='sb_publishable_WUrDsBi15bxkj8o_tQjYJQ_As76dVQR';
const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);

const OTP_SECRET='alcamp2024';
async function genOtp(ph){
  const today=new Date().toISOString().slice(0,10).replace(/-/g,'');
  const raw=ph.replace(/\D/g,'')+today+OTP_SECRET;
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(raw));
  const num=new DataView(buf).getUint32(0,false);
  return 1000+(num%9000);
}

let items=[];

function fmt(iso){
  const d=new Date(iso);
  return d.toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
}

function waLink(phone,otp,name){
  const num='218'+phone.replace(/^0+/,'');
  const msg=`مرحباً ${name}،\nرمز التحقق الخاص بك في ALCAMP:\n\n*${otp}*\n\n⏱️ صالح لمدة 5 دقائق`;
  return `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
}

function render(){
  const el=document.getElementById('list');
  if(!items.length){
    el.innerHTML=`<div class="empty"><div style="font-size:48px;margin-bottom:16px;">📭</div><p>لا توجد طلبات بعد</p><p style="font-size:12px;margin-top:8px;color:#475569;">ستظهر هنا فور طلب أي زبون رمز التحقق</p></div>`;
    return;
  }
  el.innerHTML=items.map(it=>`
    <div class="card ${it._new?'new':''}" id="card-${it.id}">
      <div class="card-header">
        <span class="name">👤 ${it.name||'زبون'}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="time">${fmt(it.created_at)}</span>
          <button class="del-btn" onclick="remove(${it.id})">✕</button>
        </div>
      </div>
      <div class="phone">📱 ${it.phone}</div>
      <div class="otp-box">
        <div class="otp-label">رمز التحقق</div>
        <div class="otp-code">${it.otp}</div>
      </div>
      <a class="wa-btn" href="${waLink(it.phone,it.otp,it.name||'')}" target="_blank">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        فتح واتساب وإرسال الرمز
      </a>
    </div>
  `).join('');
  setTimeout(()=>{items.forEach(it=>{it._new=false;const c=document.getElementById('card-'+it.id);if(c)c.classList.remove('new');});},3000);
}

async function remove(id){
  items=items.filter(x=>x.id!==id);
  render();
  await sb.from('otp_requests').delete().eq('id',id);
}

async function load(){
  const {data}=await sb.from('otp_requests').select('*').order('created_at',{ascending:false}).limit(20);
  if(data){
    items=await Promise.all(data.map(async it=>({...it,otp:await genOtp(it.phone)})));
  }
  render();
}

function subscribe(){
  sb.channel('otp').on('postgres_changes',{event:'INSERT',schema:'public',table:'otp_requests'},async payload=>{
    const it={...payload.new,_new:true};
    it.otp=await genOtp(it.phone);
    items.unshift(it);
    render();
    notify(it);
  }).subscribe(status=>{
    const dot=document.getElementById('conn-dot');
    const txt=document.getElementById('conn-txt');
    if(status==='SUBSCRIBED'){dot.classList.remove('off');txt.textContent='متصل';}
    else{dot.classList.add('off');txt.textContent='غير متصل';}
  });
}

function notify(it){
  if(Notification.permission==='granted'){
    new Notification(`🔐 رمز تحقق جديد — ${it.name||it.phone}`,{
      body:`الرمز: ${it.otp}\nالهاتف: ${it.phone}`,
      icon:'/alhossin/icon.png',
      tag:'otp-'+it.id,
      requireInteraction:true
    });
  }
}

async function enableNotif(){
  const p=await Notification.requestPermission();
  if(p==='granted'){
    document.getElementById('notif-btn').style.display='none';
    localStorage.setItem('notif','1');
  }
}

if(Notification.permission==='granted'){
  document.getElementById('notif-btn').style.display='none';
}

load();
subscribe();
</script>
</body>
</html>
