<!DOCTYPE html>
<html dir="rtl" lang="ar" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>نظام كندة</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;background:var(--bg-page);color:var(--text-main);transition:background .3s,color .3s;-webkit-tap-highlight-color:transparent}
[data-theme="light"]{
  --bg-page:#f0f4f8;--bg-card:#ffffff;--bg-sidebar:#1e3a5f;--bg-topbar:#ffffff;
  --bg-input:#ffffff;--bg-thead:#f8fafc;--bg-hover:#f1f5f9;
  --blue:#2563eb;--blue-dark:#1d4ed8;--blue-light:#3b82f6;--blue-pale:#eff6ff;--blue-border:#bfdbfe;
  --sup:#ea580c;--sup-pale:#fff7ed;--sup-border:#fed7aa;
  --mkt:#7c3aed;--mkt-pale:#f5f3ff;--mkt-border:#ddd6fe;
  --acc:#2563eb;--acc-pale:#eff6ff;--acc-border:#bfdbfe;
  --act:#16a34a;--act-pale:#f0fdf4;--act-border:#bbf7d0;
  --green:#16a34a;--red:#dc2626;--yellow:#d97706;
  --text-main:#1e293b;--text-muted:#64748b;--text-light:#94a3b8;
  --border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.1);--shadow-lg:0 10px 40px rgba(0,0,0,.12);
  --sb-text:rgba(255,255,255,.75);--sb-hover:rgba(255,255,255,.09);--sb-border:rgba(255,255,255,.08);
}
[data-theme="dark"]{
  --bg-page:#0d1117;--bg-card:#151f2e;--bg-sidebar:#0a0f1a;--bg-topbar:#151f2e;
  --bg-input:#0d1117;--bg-thead:#0d1117;--bg-hover:#1e2d45;
  --blue:#3b82f6;--blue-dark:#2563eb;--blue-light:#60a5fa;--blue-pale:#1e2d45;--blue-border:#1e3a5f;
  --sup:#fb923c;--sup-pale:rgba(251,146,60,.08);--sup-border:rgba(251,146,60,.25);
  --mkt:#a78bfa;--mkt-pale:rgba(167,139,250,.08);--mkt-border:rgba(167,139,250,.25);
  --acc:#60a5fa;--acc-pale:rgba(96,165,250,.08);--acc-border:rgba(96,165,250,.25);
  --act:#4ade80;--act-pale:rgba(74,222,128,.08);--act-border:rgba(74,222,128,.25);
  --green:#22c55e;--red:#f87171;--yellow:#fbbf24;
  --text-main:#e2e8f0;--text-muted:#94a3b8;--text-light:#475569;
  --border:#1e293b;--shadow:0 1px 3px rgba(0,0,0,.4);
  --shadow-md:0 4px 16px rgba(0,0,0,.5);--shadow-lg:0 10px 40px rgba(0,0,0,.6);
  --sb-text:rgba(226,232,240,.7);--sb-hover:rgba(255,255,255,.06);--sb-border:rgba(255,255,255,.05);
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#475569;border-radius:10px}

/* SIDEBAR */
.sidebar{position:fixed;top:0;right:0;width:240px;height:100vh;background:var(--bg-sidebar);display:flex;flex-direction:column;z-index:200;overflow-y:auto;transition:transform .3s;border-left:1px solid var(--sb-border)}
.sb-brand{padding:18px 16px;border-bottom:1px solid var(--sb-border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-dots{display:flex;gap:4px}
.sb-dot{width:10px;height:10px;border-radius:50%}
.sb-dot.d1{background:var(--sup)}.sb-dot.d2{background:var(--mkt)}.sb-dot.d3{background:var(--acc)}.sb-dot.d4{background:var(--act)}
.sb-name{font-size:15px;font-weight:800;color:#fff}
.sb-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.sb-sec{font-size:10px;font-weight:700;color:rgba(255,255,255,.28);letter-spacing:1px;padding:12px 10px 5px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--sb-text);font-size:13.5px;font-weight:500;transition:background .15s,color .15s;margin-bottom:2px;user-select:none}
.nav-item:hover{background:var(--sb-hover);color:#fff}
.nav-item.active{color:#fff}
.nav-item.active.nh{background:rgba(100,116,139,.2)}
.nav-item.active.n1{background:rgba(234,88,12,.25)}
.nav-item.active.n2{background:rgba(124,58,237,.25)}
.nav-item.active.n3{background:rgba(37,99,235,.25)}
.nav-item.active.n4{background:rgba(22,163,74,.25)}
.nav-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199}
.sb-overlay.show{display:block}

/* TOPBAR */
.topbar{position:fixed;top:0;right:240px;left:0;height:60px;background:var(--bg-topbar);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;box-shadow:var(--shadow)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-title{font-size:17px;font-weight:700;color:var(--text-main)}
.tb-date{font-size:12px;color:var(--text-light)}
.hamburger{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-muted);padding:5px 8px;border-radius:7px}
.hamburger:hover{background:var(--bg-thead)}
.theme-btn{width:38px;height:38px;border-radius:9px;background:var(--bg-thead);border:1px solid var(--border);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.theme-btn:hover{background:var(--blue-pale)}

/* PAGE */
.page-wrap{margin-right:240px;margin-top:60px;padding:24px;min-height:calc(100vh - 60px)}

/* CARD */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);margin-bottom:20px}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:700;color:var(--text-main)}
.card-body{padding:20px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--blue-light),var(--blue-dark));color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.btn-primary:hover{opacity:.9}
.btn-sec{background:var(--bg-card);color:var(--blue);border:1.5px solid var(--blue-border)}
.btn-sec:hover{background:var(--blue-pale)}
.btn-orange{background:linear-gradient(135deg,#fb923c,#ea580c);color:#fff}
.btn-orange:hover{opacity:.9}
.btn-purple{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff}
.btn-purple:hover{opacity:.9}
.btn-green{background:linear-gradient(135deg,#4ade80,#16a34a);color:#fff}
.btn-green:hover{opacity:.9}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{padding:7px 9px}
.btn-danger{background:rgba(220,38,38,.08);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.btn-danger:hover{background:rgba(220,38,38,.18)}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.ph-title{font-size:20px;font-weight:800;color:var(--text-main)}
.ph-sub{font-size:13px;color:var(--text-muted);margin-top:2px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{background:var(--bg-thead);color:var(--text-muted);font-weight:700;padding:11px 14px;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap}
tbody td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text-main)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg-hover)}
.td-pos{color:var(--green);font-weight:700}
.td-neg{color:var(--red);font-weight:700}

/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;box-shadow:var(--shadow-lg);animation:slideUp .15s;max-height:90vh;display:flex;flex-direction:column}
.modal-box.modal-lg{max-width:700px}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:700;color:var(--text-main);flex-shrink:0}
.modal-close{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-muted);padding:4px 7px;border-radius:6px}
.modal-close:hover{background:var(--bg-thead);color:var(--red)}
.modal-body{padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:13px;font-weight:600;color:var(--text-main)}
.fi{padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;color:var(--text-main);background:var(--bg-input);outline:none;transition:border .2s;font-family:inherit;width:100%}
.fi:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
select.fi option{background:var(--bg-card);color:var(--text-main)}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:opacity .3s;opacity:0;pointer-events:none}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-green{background:rgba(22,163,74,.15);color:var(--green)}
.b-red{background:rgba(220,38,38,.15);color:var(--red)}
.b-orange{background:rgba(234,88,12,.15);color:var(--sup)}
.b-blue{background:rgba(37,99,235,.15);color:var(--blue)}
.b-gray{background:rgba(100,116,139,.15);color:var(--text-muted)}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--text-muted)}
.empty-icon{font-size:50px;margin-bottom:12px;line-height:1}
.empty-title{font-size:15px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--text-light)}

/* SECTION STRIP */
.strip{border-radius:14px;padding:20px 24px;display:flex;align-items:center;gap:16px;margin-bottom:22px}
.strip.s1{background:var(--sup-pale);border:2px solid var(--sup-border)}
.strip.s2{background:var(--mkt-pale);border:2px solid var(--mkt-border)}
.strip.s3{background:var(--acc-pale);border:2px solid var(--acc-border)}
.strip.s4{background:var(--act-pale);border:2px solid var(--act-border)}
.strip-ico{font-size:32px}
.strip-ttl{font-size:20px;font-weight:800}
.strip-sub{font-size:13px;color:var(--text-muted);margin-top:2px}
.s1 .strip-ttl{color:var(--sup)}.s2 .strip-ttl{color:var(--mkt)}.s3 .strip-ttl{color:var(--acc)}.s4 .strip-ttl{color:var(--act)}

/* DASHBOARD */
.sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.sec-card{border-radius:18px;padding:26px;cursor:pointer;border:2px solid transparent;display:flex;flex-direction:column;gap:14px;min-height:170px;transition:transform .2s,box-shadow .2s}
.sec-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.sc1{background:var(--sup-pale);border-color:var(--sup-border)}
.sc2{background:var(--mkt-pale);border-color:var(--mkt-border)}
.sc3{background:var(--acc-pale);border-color:var(--acc-border)}
.sc4{background:var(--act-pale);border-color:var(--act-border)}
.sc-head{display:flex;align-items:flex-start;gap:14px}
.sc-ico{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.sc1 .sc-ico{background:rgba(234,88,12,.15)}.sc2 .sc-ico{background:rgba(124,58,237,.15)}
.sc3 .sc-ico{background:rgba(37,99,235,.15)}.sc4 .sc-ico{background:rgba(22,163,74,.15)}
.sc-ttl{font-size:17px;font-weight:800;margin-bottom:4px}
.sc1 .sc-ttl{color:var(--sup)}.sc2 .sc-ttl{color:var(--mkt)}.sc3 .sc-ttl{color:var(--acc)}.sc4 .sc-ttl{color:var(--act)}
.sc-desc{font-size:12.5px;color:var(--text-muted);line-height:1.6}
.sc-foot{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
.sc-stat{font-size:12px;color:var(--text-muted)}
.sc-stat strong{color:var(--text-main)}
.sc-arr{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;transition:transform .2s}
.sec-card:hover .sc-arr{transform:translateX(-4px)}
.sc1 .sc-arr{background:rgba(234,88,12,.12);color:var(--sup)}
.sc2 .sc-arr{background:rgba(124,58,237,.12);color:var(--mkt)}
.sc3 .sc-arr{background:rgba(37,99,235,.12);color:var(--acc)}
.sc4 .sc-arr{background:rgba(22,163,74,.12);color:var(--act)}

/* SUB GRID */
.sub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sub-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;text-align:center;transition:all .2s}
.sub-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.sub-ico{font-size:28px}
.sub-lbl{font-size:14px;font-weight:700;color:var(--text-main)}
.sub-cnt{font-size:11px;color:var(--text-muted)}
.sub-add{border:2px dashed var(--border);background:transparent;color:var(--text-muted)}
.sub-add:hover{border-color:var(--blue-light);color:var(--blue);background:var(--blue-pale);box-shadow:none;transform:none}

/* SUMMARY ROW */
.sum-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.sum-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.sum-lbl{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.sum-val{font-size:20px;font-weight:800;color:var(--text-main)}

/* ITEMS TABLE (inside modal) */
.itbl{width:100%;border-collapse:collapse;font-size:13px}
.itbl th{background:var(--bg-thead);padding:8px 10px;text-align:right;color:var(--text-muted);font-weight:700;border-bottom:1px solid var(--border)}
.itbl td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text-main)}
.itbl tr:last-child td{border-bottom:none}

/* BACK LINK */
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:20px}

/* RESPONSIVE */
@media(max-width:900px){.sub-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .sidebar{transform:translateX(100%)}.sidebar.open{transform:translateX(0)}
  .topbar{right:0}.page-wrap{margin-right:0;padding:16px}
  .hamburger{display:flex}.sec-grid{grid-template-columns:1fr;gap:14px}
  .sec-card{min-height:auto;padding:22px}
}
@media(max-width:480px){.sub-grid{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}}
@media print{.sidebar,.topbar,.hamburger,.sb-overlay{display:none!important}.page-wrap{margin:0!important}}
</style>
</head>
<body>

<div class="sb-overlay" id="sbOverlay" onclick="closeSB()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sb-brand">
    <div class="sb-dots">
      <div class="sb-dot d1"></div><div class="sb-dot d2"></div>
      <div class="sb-dot d3"></div><div class="sb-dot d4"></div>
    </div>
    <div>
      <div class="sb-name">نظام كندة</div>
      <div class="sb-sub" id="sbSub">شركة كندة</div>
    </div>
  </div>
  <div class="sb-nav">
    <div class="sb-sec">الرئيسية</div>
    <div class="nav-item nh active" data-p="home" onclick="goPage('home')"><span class="nav-icon">🏠</span>الرئيسية</div>
    <div class="sb-sec" style="color:var(--sup);opacity:.9">الشركة الموردة</div>
    <div class="nav-item n1" data-p="supplier" onclick="goPage('supplier')"><span class="nav-icon">🏢</span>الشركة الموردة</div>
    <div class="sb-sec" style="color:var(--mkt);opacity:.9">التسويق</div>
    <div class="nav-item n2" data-p="marketing" onclick="goPage('marketing')"><span class="nav-icon">📣</span>قسم التسويق</div>
    <div class="sb-sec" style="color:var(--acc);opacity:.9">المحاسبة</div>
    <div class="nav-item n3" data-p="accounting" onclick="goPage('accounting')"><span class="nav-icon">📒</span>قسم المحاسبة</div>
    <div class="sb-sec" style="color:var(--act);opacity:.9">الحسابات</div>
    <div class="nav-item n4" data-p="accounts" onclick="goPage('accounts')"><span class="nav-icon">💰</span>قسم الحسابات</div>
    <div class="sb-sec">الإدارة</div>
    <div class="nav-item nh" data-p="settings" onclick="goPage('settings')"><span class="nav-icon">⚙️</span>الإعدادات</div>
  </div>
</nav>

<header class="topbar">
  <div class="tb-left">
    <button class="hamburger" onclick="toggleSB()">☰</button>
    <div>
      <div class="tb-title" id="tbTitle">الرئيسية</div>
      <div class="tb-date" id="tbDate"></div>
    </div>
  </div>
  <div class="tb-right">
    <button class="theme-btn" onclick="toggleTheme()"><span id="thIco">🌙</span></button>
  </div>
</header>

<main class="page-wrap"><div id="pc"></div></main>
<div id="toast"></div>

<script>
// ═══ STORAGE ═══
const DB={
  get:(k,d=[])=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  obj:(k)=>{try{return JSON.parse(localStorage.getItem(k))??{}}catch{return{}}},
  setObj:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
};
const K={
  settings:    'k2_settings',
  theme:       'kinda_theme',
  sup_pmts:    'k2_sup_pmts',
  sup_invoices:'k2_sup_invoices',
  sup_items:   'k2_sup_items',
  marketers:   'k2_marketers',
  mkt_takes:   'k2_mkt_takes',
  mkt_titems:  'k2_mkt_titems',
  mkt_expenses:'k2_mkt_expenses',
  cust_debts:  'k2_cust_debts',
  cust_pmts:   'k2_cust_pmts',
  manager_txns:'k2_manager_txns',
};

// ═══ UTILS ═══
function fmt(n){return Number(n||0).toLocaleString('ar-LY',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(d){if(!d)return'';const p=String(d).split('-');return`${p[2]}/${p[1]}/${p[0]}`}
function today(){return new Date().toISOString().split('T')[0]}
function genId(){return Date.now()+Math.floor(Math.random()*9999)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function arabicNow(){return new Date().toLocaleDateString('ar-LY',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2600)}
function closeMW(){const el=document.getElementById('mw');if(el)el.innerHTML=''}

// ═══ SETTINGS ═══
function getSettings(){return DB.obj(K.settings)}
function getSetting(k,d=''){return getSettings()[k]??d}
function saveSettings(o){DB.setObj(K.settings,{...getSettings(),...o});applySettings()}
function applySettings(){
  const n=getSetting('companyName','شركة كندة');
  document.querySelectorAll('.dyn-co').forEach(el=>el.textContent=n);
  const sb=document.getElementById('sbSub');if(sb)sb.textContent=n;
  document.title=getSetting('appTitle','نظام كندة');
}

// ═══ THEME ═══
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const el=document.getElementById('thIco');if(el)el.textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem(K.theme,t);
}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')}

// ═══ SIDEBAR ═══

// ═══ NAVIGATION ═══
const PAGE_TITLES={
  home:'الرئيسية',supplier:'الشركة الموردة',
  sup_account:'حساب الشركة الموردة',sup_invoices:'فواتير الشراء',sup_inv_detail:'تفاصيل الفاتورة',
  marketing:'قسم التسويق',warehouse:'المخزن',marketer:'حساب المسوق',
  accounting:'قسم المحاسبة',
  accounts:'قسم الحسابات',cust_debts:'ديون الزباين',
  mkt_accounts:'حسابات المسوقين',manager_account:'حساب المدير',company_account:'حساب الشركة',
  settings:'الإعدادات',
};

function goPage(page,params={}){
  closeSB();
  document.querySelectorAll('.nav-item').forEach(el=>{
    const dp=el.dataset.p;
    const active=dp===page
      ||(dp==='supplier'&&['sup_account','sup_invoices','sup_inv_detail'].includes(page))
      ||(dp==='marketing'&&['warehouse','marketer'].includes(page))
      ||(dp==='accounts'&&['cust_debts','mkt_accounts','manager_account','company_account'].includes(page));
    el.classList.toggle('active',active);
  });
  document.getElementById('tbTitle').textContent=PAGE_TITLES[page]||page;
  document.getElementById('tbDate').textContent=arabicNow();
  const pc=document.getElementById('pc');
  switch(page){
    case 'home':            pc.innerHTML=renderHome();break;
    case 'supplier':        pc.innerHTML=renderSupplier();break;
    case 'sup_account':     pc.innerHTML=renderSupAccount();break;
    case 'sup_invoices':    pc.innerHTML=renderSupInvoices();break;
    case 'sup_inv_detail':  pc.innerHTML=renderInvDetail(params.id);break;
    case 'marketing':       pc.innerHTML=renderMarketing();break;
    case 'warehouse':       pc.innerHTML=renderWarehouse();break;
    case 'marketer':        pc.innerHTML=renderMarketerPage(params.id);break;
    case 'accounting':      pc.innerHTML=renderAccounting();break;
    case 'accounts':        pc.innerHTML=renderAccounts();break;
    case 'cust_debts':      pc.innerHTML=renderCustDebts();break;
    case 'mkt_accounts':    pc.innerHTML=renderMktAccounts();break;
    case 'manager_account': pc.innerHTML=renderManagerAccount();break;
    case 'company_account': pc.innerHTML=renderCompanyAccount();break;
    case 'settings':        pc.innerHTML=renderSettings();break;
    default: pc.innerHTML='';
  }
}

// ─── Supplier Account (Payments Ledger) ───
function renderSupAccount(){
  const invs=DB.get(K.sup_invoices);
  const pmts=DB.get(K.sup_pmts);
  const entries=[];
  invs.forEach(r=>entries.push({date:r.date,type:'inv',label:`فاتورة ${esc(r.inv_num||('#'+r.id))}`,amount:r.total||0,method:'',commission:0}));
  pmts.forEach(r=>entries.push({date:r.date,type:'pmt',label:`دفعة ${r.method==='transfer'?'(تحويل)':'(كاش)'}${r.note?' - '+esc(r.note):''}`,amount:r.amount||0,method:r.method,commission:r.commission||0}));
  entries.sort((a,b)=>a.date.localeCompare(b.date));
  let bal=0;
  const rows=entries.map(e=>{
    if(e.type==='inv')bal+=e.amount; else bal-=e.amount;
    const comm=e.commission>0?`<span class="badge b-orange">${fmt(e.commission)}</span>`:'—';
    return`<tr>
      <td>${fmtDate(e.date)}</td>
      <td>${e.label}</td>
      <td>${e.type==='inv'?`<span class="td-neg">+${fmt(e.amount)}</span>`:`<span class="td-pos">-${fmt(e.amount)}</span>`}</td>
      <td>${comm}</td>
      <td style="font-weight:700;color:${bal>0?'var(--red)':'var(--green)'}">${fmt(bal)}</td>
    </tr>`;
  }).join('');
  return`
  <div class="back-row"><button class="btn btn-sec btn-sm" onclick="goPage('supplier')">← الشركة الموردة</button></div>
  <div class="ph">
    <div><div class="ph-title">حساب الشركة الموردة</div><div class="ph-sub">جميع الفواتير والدفعات</div></div>
    <button class="btn btn-orange" onclick="openPayModal()">+ دفعة جديدة</button>

    <div class="tbl-wrap"><table>
      <thead><tr><th>التاريخ</th><th>البيان</th><th>المبلغ</th><th>عمولة التحويل</th><th>الرصيد المتبقي</th></tr></thead>

    </table></div>

function savePayment(){
  const date=document.getElementById('pm_d').value;
  const method=document.getElementById('pm_m').value;
  const amount=parseFloat(document.getElementById('pm_a').value||0);
  const commission=parseFloat(document.getElementById('pm_c')?.value||0);
  const note=document.getElementById('pm_n').value.trim();
  if(!date||!amount){showToast('يرجى إدخال التاريخ والمبلغ');return}
  const arr=DB.get(K.sup_pmts);
  arr.push({id:genId(),date,method,amount,commission,note});
  DB.set(K.sup_pmts,arr);
  closeMW();showToast('✅ تم حفظ الدفعة');
  goPage('sup_account');
}

function closeInvModal(){_iLines=[];closeMW()}
function _updInvTot(){const t=_iLines.reduce((s,l)=>s+l.qty*l.price,0);const el=document.getElementById('invTot');if(el)el.textContent=fmt(t)}
function saveInv(){
  const date=document.getElementById('iv_d').value;
  const inv_num=document.getElementById('iv_n').value.trim();
  if(!date){showToast('يرجى إدخال التاريخ');return}
  const valid=_iLines.filter(l=>l.name.trim()&&l.qty>0);
  if(!valid.length){showToast('أضف صنفاً واحداً على الأقل');return}
  const id=genId();
  const total=valid.reduce((s,l)=>s+l.qty*l.price,0);
  const invs=DB.get(K.sup_invoices);invs.push({id,date,inv_num,total});DB.set(K.sup_invoices,invs);
  const items=DB.get(K.sup_items);
  valid.forEach(l=>items.push({id:genId(),inv_id:id,name:l.name.trim(),qty:l.qty,price:l.price}));
  DB.set(K.sup_items,items);
  closeInvModal();showToast('✅ تم حفظ الفاتورة وإضافة الأصناف للمخزن');
  goPage('sup_invoices');
}

  DB.set(K.sup_items,DB.get(K.sup_items).filter(r=>r.inv_id!==id));
  showToast('🗑 تم الحذف');goPage('sup_invoices');

function computeWarehouse(){
  const invItems=DB.get(K.sup_items);
  const takeItems=DB.get(K.mkt_titems);
  const map={};
  invItems.forEach(i=>{
    if(!map[i.name])map[i.name]={name:i.name,imported:0,taken:0};
    map[i.name].imported+=i.qty;
  });
  takeItems.forEach(i=>{
    if(!map[i.name])map[i.name]={name:i.name,imported:0,taken:0};
    map[i.name].taken+=i.qty;
  });
  return Object.values(map).map(i=>({...i,remaining:i.imported-i.taken}));
}

function renderMarketing(){
  const mkts=DB.get(K.marketers);

      <div class="sub-cnt">${m.phone?esc(m.phone):'مسوق'}</div>
    </div>`).join('');
  return`

    <div><div class="strip-ttl">قسم التسويق</div><div class="strip-sub">المسوقون والمخزن</div></div>

function deleteMkt(id){
  if(!confirm('حذف هذا المسوق وجميع بياناته؟'))return;
  DB.set(K.marketers,DB.get(K.marketers).filter(r=>r.id!==id));
  const tIds=DB.get(K.mkt_takes).filter(t=>t.mkt_id===id).map(t=>t.id);
  DB.set(K.mkt_takes,DB.get(K.mkt_takes).filter(t=>t.mkt_id!==id));
  DB.set(K.mkt_titems,DB.get(K.mkt_titems).filter(i=>!tIds.includes(i.take_id)));
  DB.set(K.mkt_expenses,DB.get(K.mkt_expenses).filter(e=>e.mkt_id!==id));
  showToast('🗑 تم الحذف');goPage('marketing');
}
function deleteTake(tid,mid){
  if(!confirm('حذف هذه العملية؟'))return;
  DB.set(K.mkt_takes,DB.get(K.mkt_takes).filter(r=>r.id!==tid));
  DB.set(K.mkt_titems,DB.get(K.mkt_titems).filter(r=>r.take_id!==tid));
  showToast('🗑 تم الحذف');goPage('marketer',{id:mid});
}
function deleteExpense(eid,mid){
  if(!confirm('حذف هذا المصروف؟'))return;
  DB.set(K.mkt_expenses,DB.get(K.mkt_expenses).filter(r=>r.id!==eid));
  showToast('🗑 تم الحذف');goPage('marketer',{id:mid});
}

// ─── Take Modal ───
let _tkMid=null,_tkAvail=[],_tkLines=[];
function openTakeModal(mid){
  _tkMid=mid;
  _tkAvail=computeWarehouse().filter(i=>i.remaining>0);
  _tkLines=[{name:'',qty:1,price:0}];
  _buildTakeModal();
}
function _buildTakeModal(){
  const total=_tkLines.reduce((s,l)=>s+l.qty*l.price,0);
  const opts=_tkAvail.map(a=>`<option value="${esc(a.name)}">${esc(a.name)} (متاح: ${a.remaining})</option>`).join('');
  const linesHtml=_tkLines.map((l,i)=>`<tr>
    <td><select class="fi" style="min-width:160px" onchange="_tkLines[${i}].name=this.value;const w=_tkAvail.find(a=>a.name===this.value);if(w)_tkLines[${i}].maxQ=w.remaining;_updTakeTot()">
      <option value="">-- اختر صنف --</option>${opts.replace(`value="${esc(l.name)}"`,`value="${esc(l.name)}" selected`)}
    </select></td>
    <td><input type="number" class="fi" style="width:75px" value="${l.qty}" min="1" oninput="_tkLines[${i}].qty=Math.min(+this.value||1,_tkLines[${i}].maxQ||9999);_updTakeTot()"></td>
    <td><input type="number" class="fi" style="width:90px" value="${l.price}" min="0" step="0.01" oninput="_tkLines[${i}].price=+this.value||0;_updTakeTot()"></td>
    <td style="font-weight:700;min-width:70px">${fmt(l.qty*l.price)}</td>
    <td><button class="btn btn-danger btn-sm btn-icon" onclick="_tkLines.splice(${i},1);_buildTakeModal()">✕</button></td>
  </tr>`).join('');
  document.getElementById('mw').innerHTML=`
  <div class="modal-bg" onclick="closeTakeModal()">
  <div class="modal-box modal-lg" onclick="event.stopPropagation()">
    <div class="modal-head"><span>أخذ بضاعة من المخزن</span><button class="modal-close" onclick="closeTakeModal()">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label class="fl">التاريخ</label><input type="date" id="tk_d" class="fi" style="max-width:200px" value="${today()}"></div>
      ${_tkAvail.length===0
        ?`<div style="color:var(--red);font-size:13px;padding:10px 0">المخزن فارغ، أضف فواتير شراء أولاً</div>`
        :`<div>
          <div style="font-size:13px;font-weight:700;margin-bottom:8px">الأصناف المأخوذة</div>
          <div class="tbl-wrap"><table class="itbl">
            <thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th><th></th></tr></thead>
            <tbody>${linesHtml}</tbody>
          </table></div>
          <button class="btn btn-sec btn-sm" style="margin-top:10px" onclick="_tkLines.push({name:'',qty:1,price:0,maxQ:9999});_buildTakeModal()">+ إضافة صنف</button>
          <div style="text-align:left;font-size:16px;font-weight:800;color:var(--red);margin-top:10px">الإجمالي: <span id="tkTot">${fmt(total)}</span></div>
        </div>`}
    </div>
    <div class="modal-foot">
      <button class="btn btn-sec" onclick="closeTakeModal()">إلغاء</button>
      ${_tkAvail.length>0?`<button class="btn btn-purple" onclick="saveTake()">💾 حفظ</button>`:''}
    </div>
  </div></div>`;
}
function closeTakeModal(){_tkMid=null;_tkLines=[];closeMW()}
function _updTakeTot(){const t=_tkLines.reduce((s,l)=>s+l.qty*l.price,0);const el=document.getElementById('tkTot');if(el)el.textContent=fmt(t)}
function saveTake(){
  const date=document.getElementById('tk_d').value;
  if(!date){showToast('يرجى إدخال التاريخ');return}
  const valid=_tkLines.filter(l=>l.name&&l.qty>0);
  if(!valid.length){showToast('اختر صنفاً واحداً على الأقل');return}
  // Check warehouse availability
  for(const l of valid){
    const w=_tkAvail.find(a=>a.name===l.name);
    if(w&&l.qty>w.remaining){showToast(`الكمية المتاحة من "${l.name}" هي ${w.remaining} فقط`);return}
  }
  const tid=genId();
  const takes=DB.get(K.mkt_takes);takes.push({id:tid,mkt_id:_tkMid,date});DB.set(K.mkt_takes,takes);
  const items=DB.get(K.mkt_titems);
  valid.forEach(l=>items.push({id:genId(),take_id:tid,name:l.name,qty:l.qty,price:l.price}));
  DB.set(K.mkt_titems,items);
  const mid=_tkMid;closeTakeModal();showToast('✅ تم التسجيل');goPage('marketer',{id:mid});
}

// ═══════════════════════════════════════════
function renderAccounting(){
  const invs=DB.get(K.sup_invoices);
  const pmts=DB.get(K.sup_pmts);
  const mkts=DB.get(K.marketers);
  const expenses=DB.get(K.mkt_expenses);
  const manTxns=DB.get(K.manager_txns);

  // Build unified journal
  const entries=[];
  invs.forEach(r=>entries.push({date:r.date,desc:`فاتورة شراء ${esc(r.inv_num||('#'+r.id))}`,debit:r.total||0,credit:0,src:'الشركة الموردة'}));
  pmts.forEach(r=>{
    entries.push({date:r.date,desc:`دفعة للشركة ${r.method==='transfer'?'(تحويل)':'(كاش)'}${r.note?' - '+esc(r.note):''}`,debit:0,credit:r.amount||0,src:'الشركة الموردة'});
    if(r.commission>0)entries.push({date:r.date,desc:'عمولة تحويل',debit:r.commission,credit:0,src:'بنك'});
  });
  expenses.forEach(e=>{
    const m=mkts.find(r=>r.id===e.mkt_id);
    entries.push({date:e.date,desc:`مصروف: ${esc(e.desc)} (${m?esc(m.name):'مسوق'})`,debit:e.amount||0,credit:0,src:'التسويق'});
  });
  manTxns.forEach(r=>{
    if(r.type==='out')entries.push({date:r.date,desc:`مدير - صرف: ${esc(r.desc)}`,debit:r.amount||0,credit:0,src:'المدير'});
    else entries.push({date:r.date,desc:`مدير - استلام: ${esc(r.desc)}`,debit:0,credit:r.amount||0,src:'المدير'});
  });
  entries.sort((a,b)=>a.date.localeCompare(b.date));

  const totalDebit=entries.reduce((s,e)=>s+(e.debit||0),0);
  const totalCredit=entries.reduce((s,e)=>s+(e.credit||0),0);
  const rows=entries.map(e=>`<tr>
    <td>${fmtDate(e.date)}</td>
    <td>${e.desc}</td>
    <td><span class="badge b-gray">${esc(e.src)}</span></td>
    <td>${e.debit>0?`<span class="td-neg">${fmt(e.debit)}</span>`:'—'}</td>
    <td>${e.credit>0?`<span class="td-pos">${fmt(e.credit)}</span>`:'—'}</td>
  </tr>`).join('');

  return`
  <div class="strip s3"><div class="strip-ico">📒</div>
    <div><div class="strip-ttl">قسم المحاسبة</div><div class="strip-sub">سجل اليومية العام</div></div>
  </div>
  <div class="sum-row">
    <div class="sum-box"><div class="sum-lbl">إجمالي المدين (الصادر)</div><div class="sum-val" style="color:var(--red)">${fmt(totalDebit)}</div></div>
    <div class="sum-box"><div class="sum-lbl">إجمالي الدائن (الوارد)</div><div class="sum-val" style="color:var(--green)">${fmt(totalCredit)}</div></div>
    <div class="sum-box"><div class="sum-lbl">الفرق</div><div class="sum-val" style="color:${totalDebit>totalCredit?'var(--red)':'var(--green)'}">${fmt(Math.abs(totalDebit-totalCredit))}</div></div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">سجل اليومية</span><span style="font-size:12px;color:var(--text-muted)">${entries.length} قيد</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>التاريخ</th><th>البيان</th><th>المصدر</th><th>مدين</th><th>دائن</th></tr></thead>
      <tbody>${rows||`<tr><td colspan="5"><div class="empty"><div class="empty-icon">📒</div><div class="empty-title">لا توجد قيود بعد</div></div></td></tr>`}</tbody>
    </table></div>
  </div>`;
}

      <div class="fg"><label class="fl">المبلغ</label><input type="number" id="db_a" class="fi" placeholder="0.00" min="0" step="0.01"></div>

    </div>
    <div class="modal-foot">
      <button class="btn btn-sec" onclick="closeMW()">إلغاء</button>
      <button class="btn btn-green" onclick="saveDebt()">💾 حفظ</button>
    </div>
  </div></div>`;
  setTimeout(()=>document.getElementById('db_n')?.focus(),50);
}
function saveDebt(){
  const name=document.getElementById('db_n').value.trim();
  const date=document.getElementById('db_d').value;
  const amount=parseFloat(document.getElementById('db_a').value||0);
  const note=document.getElementById('db_note').value.trim();
  if(!name||!date||!amount){showToast('يرجى ملء الاسم والتاريخ والمبلغ');return}
  const arr=DB.get(K.cust_debts);arr.push({id:genId(),name,date,amount,note});DB.set(K.cust_debts,arr);
  closeMW();showToast('✅ تم الحفظ');goPage('cust_debts');
}
function deleteDebt(id){
  if(!confirm('حذف هذا الدين؟'))return;
  DB.set(K.cust_debts,DB.get(K.cust_debts).filter(r=>r.id!==id));
  DB.set(K.cust_pmts,DB.get(K.cust_pmts).filter(r=>r.debt_id!==id));
  showToast('🗑 تم الحذف');goPage('cust_debts');
}
function openDebtPayModal(debt_id){
  const d=DB.get(K.cust_debts).find(r=>r.id===debt_id);if(!d)return;
  document.getElementById('mw').innerHTML=`
  <div class="modal-bg" onclick="closeMW()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head"><span>تسجيل دفعة - ${esc(d.name)}</span><button class="modal-close" onclick="closeMW()">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="fg"><label class="fl">التاريخ</label><input type="date" id="dp_d" class="fi" value="${today()}"></div>
        <div class="fg"><label class="fl">المبلغ المدفوع</label><input type="number" id="dp_a" class="fi" placeholder="0.00" min="0" step="0.01"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-sec" onclick="closeMW()">إلغاء</button>
      <button class="btn btn-green" onclick="saveDebtPay(${debt_id})">💾 حفظ الدفعة</button>
    </div>
  </div></div>`;
  setTimeout(()=>document.getElementById('dp_a')?.focus(),50);
}
function saveDebtPay(debt_id){
  const date=document.getElementById('dp_d').value;
  const amount=parseFloat(document.getElementById('dp_a').value||0);
  if(!date||!amount){showToast('يرجى إدخال التاريخ والمبلغ');return}
  const arr=DB.get(K.cust_pmts);arr.push({id:genId(),debt_id,date,amount});DB.set(K.cust_pmts,arr);
  closeMW();showToast('✅ تم تسجيل الدفعة');goPage('cust_debts');
}

// ─── Marketer Accounts ───
function renderMktAccounts(){
  const mkts=DB.get(K.marketers);
  const allTakes=DB.get(K.mkt_takes);
  const allTItems=DB.get(K.mkt_titems);
  const allExp=DB.get(K.mkt_expenses);
  const rows=mkts.map(m=>{
    const takes=allTakes.filter(t=>t.mkt_id===m.id);
    const takesVal=takes.reduce((s,t)=>s+allTItems.filter(i=>i.take_id===t.id).reduce((ss,i)=>ss+i.qty*i.price,0),0);
    const expTotal=allExp.filter(e=>e.mkt_id===m.id).reduce((s,e)=>s+(e.amount||0),0);
    return`<tr onclick="goPage('marketer',{id:${m.id}})" style="cursor:pointer">
      <td style="font-weight:700">${esc(m.name)}</td>
      <td class="td-neg">${fmt(takesVal)}</td>
      <td class="td-neg">${fmt(expTotal)}</td>
      <td style="font-weight:800;color:var(--red)">${fmt(takesVal+expTotal)}</td>
    </tr>`;
  }).join('');
  return`
  <div class="back-row"><button class="btn btn-sec btn-sm" onclick="goPage('accounts')">← الحسابات</button></div>
  <div class="ph"><div><div class="ph-title">حسابات المسوقين</div><div class="ph-sub">${mkts.length} مسوق</div></div></div>
  <div class="card"><div class="tbl-wrap"><table>
    <thead><tr><th>المسوق</th><th>قيمة البضاعة</th><th>المصروفات</th><th>الإجمالي</th></tr></thead>
    <tbody>${rows||`<tr><td colspan="4"><div class="empty"><div class="empty-icon">📣</div><div class="empty-title">لا يوجد مسوقون</div></div></td></tr>`}</tbody>
  </table></div></div>`;
}

// ─── Manager Account ───
function renderManagerAccount(){
  const txns=DB.get(K.manager_txns).sort((a,b)=>a.date.localeCompare(b.date));
  let bal=0;
  const rows=txns.map(r=>{
    if(r.type==='out')bal+=r.amount; else bal-=r.amount;
    return`<tr>
      <td>${fmtDate(r.date)}</td>
      <td>${esc(r.desc)}</td>
      <td>${r.type==='out'?`<span class="td-neg">${fmt(r.amount)}</span>`:'—'}</td>
      <td>${r.type==='in'?`<span class="td-pos">${fmt(r.amount)}</span>`:'—'}</td>
      <td style="font-weight:700;color:${bal>0?'var(--red)':'var(--green)'}">${fmt(bal)}</td>
      <td><button class="btn btn-danger btn-sm btn-icon" onclick="deleteMgrTxn(${r.id})">🗑</button></td>
    </tr>`;
  }).join('');
  const totalOut=txns.filter(r=>r.type==='out').reduce((s,r)=>s+(r.amount||0),0);
  const totalIn=txns.filter(r=>r.type==='in').reduce((s,r)=>s+(r.amount||0),0);
  return`
  <div class="back-row"><button class="btn btn-sec btn-sm" onclick="goPage('accounts')">← الحسابات</button></div>
  <div class="ph">
    <div><div class="ph-title">حساب المدير</div></div>
    <button class="btn btn-primary" onclick="openMgrModal()">+ حركة جديدة</button>
  </div>
  <div class="sum-row">
    <div class="sum-box"><div class="sum-lbl">إجمالي الصرف للمدير</div><div class="sum-val" style="color:var(--red)">${fmt(totalOut)}</div></div>
    <div class="sum-box"><div class="sum-lbl">إجمالي الاستلام من المدير</div><div class="sum-val" style="color:var(--green)">${fmt(totalIn)}</div></div>
    <div class="sum-box"><div class="sum-lbl">الرصيد</div><div class="sum-val" style="color:${totalOut>totalIn?'var(--red)':'var(--green)'}">${fmt(Math.abs(totalOut-totalIn))}</div></div>
  </div>
  <div class="card"><div class="tbl-wrap"><table>
    <thead><tr><th>التاريخ</th><th>البيان</th><th>صرف</th><th>استلام</th><th>الرصيد</th><th></th></tr></thead>
    <tbody>${rows||`<tr><td colspan="6"><div class="empty"><div class="empty-icon">👔</div><div class="empty-title">لا توجد حركات</div></div></td></tr>`}</tbody>
  </table></div></div>
  <div id="mw"></div>`;
}
function openMgrModal(){
  document.getElementById('mw').innerHTML=`
  <div class="modal-bg" onclick="closeMW()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head"><span>حركة جديدة - حساب المدير</span><button class="modal-close" onclick="closeMW()">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="fg"><label class="fl">التاريخ</label><input type="date" id="mg_d" class="fi" value="${today()}"></div>
        <div class="fg"><label class="fl">النوع</label>
          <select id="mg_t" class="fi">
            <option value="out">صرف للمدير (أخذ)</option>
            <option value="in">استلام من المدير (أعطى)</option>
          </select>
        </div>
      </div>
      <div class="fg"><label class="fl">المبلغ</label><input type="number" id="mg_a" class="fi" placeholder="0.00" min="0" step="0.01"></div>
      <div class="fg"><label class="fl">البيان</label><input type="text" id="mg_desc" class="fi" placeholder="وصف الحركة"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-sec" onclick="closeMW()">إلغاء</button>
      <button class="btn btn-primary" onclick="saveMgrTxn()">💾 حفظ</button>
    </div>
  </div></div>`;
  setTimeout(()=>document.getElementById('mg_a')?.focus(),50);
}
function saveMgrTxn(){
  const date=document.getElementById('mg_d').value;
  const type=document.getElementById('mg_t').value;
  const amount=parseFloat(document.getElementById('mg_a').value||0);
  const desc=document.getElementById('mg_desc').value.trim();
  if(!date||!amount||!desc){showToast('يرجى ملء جميع الحقول');return}
  const arr=DB.get(K.manager_txns);arr.push({id:genId(),date,type,amount,desc});DB.set(K.manager_txns,arr);
  closeMW();showToast('✅ تم الحفظ');goPage('manager_account');
}
function deleteMgrTxn(id){
  if(!confirm('حذف هذه الحركة؟'))return;
  DB.set(K.manager_txns,DB.get(K.manager_txns).filter(r=>r.id!==id));
  showToast('🗑 تم الحذف');goPage('manager_account');
}

// ─── Company Account (view) ───
function renderCompanyAccount(){
  const invs=DB.get(K.sup_invoices);
  const pmts=DB.get(K.sup_pmts);
  const totalInvs=invs.reduce((s,r)=>s+(r.total||0),0);
  const totalPmts=pmts.reduce((s,r)=>s+(r.amount||0),0);
  const balance=totalInvs-totalPmts;
  return`
  <div class="back-row"><button class="btn btn-sec btn-sm" onclick="goPage('accounts')">← الحسابات</button></div>
  <div class="ph">
    <div><div class="ph-title">حساب الشركة الموردة</div><div class="ph-sub">ملخص الحساب</div></div>
    <button class="btn btn-orange" onclick="goPage('sup_account')">عرض التفاصيل →</button>
  </div>
  <div class="sum-row">
    <div class="sum-box"><div class="sum-lbl">إجمالي الفواتير (تطلبه الشركة)</div><div class="sum-val" style="color:var(--red)">${fmt(totalInvs)}</div></div>
    <div class="sum-box"><div class="sum-lbl">إجمالي ما دفعناه</div><div class="sum-val" style="color:var(--green)">${fmt(totalPmts)}</div></div>
    <div class="sum-box"><div class="sum-lbl">ما تبقى علينا</div><div class="sum-val" style="color:${balance>0?'var(--red)':'var(--green)'}">${fmt(balance)}</div></div>
  </div>
  <div class="card"><div class="card-body" style="display:flex;gap:14px;flex-wrap:wrap">
    <button class="btn btn-orange" onclick="goPage('sup_account')">📋 عرض كشف الحساب الكامل</button>
    <button class="btn btn-sec" onclick="goPage('sup_invoices')">🧾 فواتير الشراء</button>
  </div></div>`;
}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
function renderSettings(){
  const s=getSettings();
  return`
  <div class="ph"><div><div class="ph-title">⚙️ الإعدادات</div></div></div>
  <div class="card" style="max-width:520px">
    <div class="card-header"><span class="card-title">🏢 معلومات الشركة</span></div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:16px">
      <div class="fg"><label class="fl">اسم التطبيق</label><input type="text" id="st_title" class="fi" value="${esc(s.appTitle||'نظام كندة')}"></div>
      <div class="fg"><label class="fl">اسم الشركة</label><input type="text" id="st_co" class="fi" value="${esc(s.companyName||'شركة كندة')}"></div>
      <button class="btn btn-primary" style="align-self:flex-start" onclick="saveSettingsForm()">💾 حفظ الإعدادات</button>
    </div>
  </div>`;
}
function saveSettingsForm(){
  const title=document.getElementById('st_title').value.trim();
  const co=document.getElementById('st_co').value.trim();
  if(!title||!co){showToast('يرجى ملء جميع الحقول');return}
  saveSettings({appTitle:title,companyName:co});
  showToast('✅ تم الحفظ');
}

// ═══ INIT ═══
applyTheme(localStorage.getItem(K.theme)||'light');
applySettings();
goPage('home');
</script>
