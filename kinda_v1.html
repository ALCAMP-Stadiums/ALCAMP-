<!DOCTYPE html>
<html dir="rtl" lang="ar" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>نظام كندة</title>
<style>
/* ══════════════════════════════════════ RESET ══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; direction: rtl;
  background: var(--bg-page); color: var(--text-main); transition: background .3s, color .3s;
  -webkit-tap-highlight-color: transparent; }

/* ══════════════════════════════════════ LIGHT ══════════════════════════════════════ */
[data-theme="light"] {
  --bg-page:    #f0f4f8;
  --bg-card:    #ffffff;
  --bg-sidebar: #1e3a5f;
  --bg-topbar:  #ffffff;
  --bg-input:   #ffffff;
  --bg-thead:   #f8fafc;
  --bg-hover:   #f1f5f9;

  --blue:       #2563eb;
  --blue-dark:  #1d4ed8;
  --blue-light: #3b82f6;
  --blue-pale:  #eff6ff;
  --blue-border:#bfdbfe;

  --factory:        #ea580c;
  --factory-pale:   #fff7ed;
  --factory-border: #fed7aa;
  --marketing:      #7c3aed;
  --marketing-pale: #f5f3ff;
  --marketing-border:#ddd6fe;
  --accounting:     #2563eb;
  --accounting-pale:#eff6ff;
  --accounting-border:#bfdbfe;
  --accounts:       #16a34a;
  --accounts-pale:  #f0fdf4;
  --accounts-border:#bbf7d0;

  --green:  #16a34a;
  --red:    #dc2626;
  --yellow: #d97706;

  --text-main:  #1e293b;
  --text-muted: #64748b;
  --text-light: #94a3b8;
  --text-inv:   #ffffff;

  --border:    #e2e8f0;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.1);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.12);

  --sidebar-text:   rgba(255,255,255,.75);
  --sidebar-hover:  rgba(255,255,255,.09);
  --sidebar-border: rgba(255,255,255,.08);
}

/* ══════════════════════════════════════ DARK ══════════════════════════════════════ */
[data-theme="dark"] {
  --bg-page:    #0d1117;
  --bg-card:    #151f2e;
  --bg-sidebar: #0a0f1a;
  --bg-topbar:  #151f2e;
  --bg-input:   #0d1117;
  --bg-thead:   #0d1117;
  --bg-hover:   #1e2d45;

  --blue:       #3b82f6;
  --blue-dark:  #2563eb;
  --blue-light: #60a5fa;
  --blue-pale:  #1e2d45;
  --blue-border:#1e3a5f;

  --factory:        #fb923c;
  --factory-pale:   rgba(251,146,60,.08);
  --factory-border: rgba(251,146,60,.25);
  --marketing:      #a78bfa;
  --marketing-pale: rgba(167,139,250,.08);
  --marketing-border:rgba(167,139,250,.25);
  --accounting:     #60a5fa;
  --accounting-pale:rgba(96,165,250,.08);
  --accounting-border:rgba(96,165,250,.25);
  --accounts:       #4ade80;
  --accounts-pale:  rgba(74,222,128,.08);
  --accounts-border:rgba(74,222,128,.25);

  --green:  #22c55e;
  --red:    #f87171;
  --yellow: #fbbf24;

  --text-main:  #e2e8f0;
  --text-muted: #94a3b8;
  --text-light: #475569;
  --text-inv:   #e2e8f0;

  --border:    #1e293b;
  --shadow:    0 1px 3px rgba(0,0,0,.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,.5);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.6);

  --sidebar-text:   rgba(226,232,240,.7);
  --sidebar-hover:  rgba(255,255,255,.06);
  --sidebar-border: rgba(255,255,255,.05);
}

/* ══════════════════════════════════════ SCROLLBAR ══════════════════════════════════════ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

/* ══════════════════════════════════════ LOGIN ══════════════════════════════════════ */
#loginPage {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg-page); padding: 20px; position: relative;
  background: linear-gradient(135deg,
    var(--factory) 0%, var(--blue) 35%, var(--marketing) 65%, var(--accounts) 100%);
}
[data-theme="dark"] #loginPage {
  background: linear-gradient(135deg, #0a0f1a 0%, #0d1117 60%, #151f2e 100%);
}
.login-theme-btn {
  position: absolute; top: 16px; left: 16px;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
  color: #fff; border-radius: 8px; padding: 7px 13px; cursor: pointer;
  font-size: 13px; font-family: inherit; display: flex; align-items: center; gap: 6px;
  transition: background .2s;
}
.login-theme-btn:hover { background: rgba(255,255,255,.25); }
.login-box {
  background: var(--bg-card); border-radius: 20px; padding: 40px 36px;
  width: 100%; max-width: 420px;
  box-shadow: 0 30px 60px rgba(0,0,0,.3);
  border: 1px solid var(--border);
}
.login-logo-row {
  display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;
}
.login-dot {
  width: 14px; height: 14px; border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
.login-dot:nth-child(1) { background: var(--factory);    animation-delay: 0s; }
.login-dot:nth-child(2) { background: var(--marketing);  animation-delay: .3s; }
.login-dot:nth-child(3) { background: var(--accounting); animation-delay: .6s; }
.login-dot:nth-child(4) { background: var(--accounts);   animation-delay: .9s; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.4);opacity:1} }
.login-title { font-size: 24px; font-weight: 800; color: var(--text-main); text-align: center; margin-bottom: 4px; }
.login-sub   { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 28px; }
.form-group  { margin-bottom: 16px; }
.form-label  { display: block; font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 7px; }
.form-input  {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: 9px; font-size: 14px; color: var(--text-main); background: var(--bg-input);
  outline: none; transition: border .2s, box-shadow .2s; font-family: inherit;
}
.form-input:focus { border-color: var(--blue-light); box-shadow: 0 0 0 3px rgba(59,130,246,.18); }
.form-input::placeholder { color: var(--text-light); }
select.form-input option { background: var(--bg-card); color: var(--text-main); }
.login-btn {
  width: 100%; padding: 13px; border: none; border-radius: 9px;
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
  background: linear-gradient(135deg, var(--blue-light), var(--blue-dark));
  color: #fff; box-shadow: 0 4px 14px rgba(37,99,235,.4);
  transition: opacity .2s, transform .1s;
}
.login-btn:hover  { opacity: .9; }
.login-btn:active { transform: scale(.98); }
.login-error {
  background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca;
  border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 12px; display: none;
}
[data-theme="dark"] .login-error { background: rgba(220,38,38,.15); color: #fca5a5; border-color: rgba(220,38,38,.3); }
.quick-login {
  margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border);
}
.quick-login-title { font-size: 11px; color: var(--text-light); text-align: center; margin-bottom: 8px; }
.quick-btns { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
.q-btn {
  padding: 8px 4px; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--bg-input); color: var(--text-main); cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 600;
  transition: all .15s; text-align: center;
}
.q-btn:hover { border-color: var(--blue-light); background: var(--blue-pale); }

/* ══════════════════════════════════════ SHELL ══════════════════════════════════════ */
#appShell { display: none; min-height: 100vh; }

/* Sidebar */
.sidebar {
  position: fixed; top: 0; right: 0; width: 240px; height: 100vh;
  background: var(--bg-sidebar); display: flex; flex-direction: column;
  z-index: 200; overflow-y: auto; transition: transform .3s ease;
  border-left: 1px solid var(--sidebar-border);
}
.sidebar-brand {
  padding: 18px 16px; border-bottom: 1px solid var(--sidebar-border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.brand-dots { display: flex; gap: 4px; }
.brand-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.brand-dot.d-factory    { background: var(--factory); }
.brand-dot.d-marketing  { background: var(--marketing); }
.brand-dot.d-accounting { background: var(--accounting); }
.brand-dot.d-accounts   { background: var(--accounts); }
.brand-name { font-size: 15px; font-weight: 800; color: #fff; }
.brand-sub  { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 1px; }

.sidebar-nav { flex: 1; padding: 8px; overflow-y: auto; }
.nav-section {
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,.28);
  letter-spacing: 1.2px; text-transform: uppercase;
  padding: 12px 10px 5px; margin-top: 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  color: var(--sidebar-text); font-size: 13.5px; font-weight: 500;
  transition: background .15s, color .15s; margin-bottom: 2px; user-select: none;
}
.nav-item:hover { background: var(--sidebar-hover); color: #fff; }
.nav-item.active { color: #fff; }
.nav-item.active.s-factory    { background: rgba(234,88,12,.25); }
.nav-item.active.s-marketing  { background: rgba(124,58,237,.25); }
.nav-item.active.s-accounting { background: rgba(37,99,235,.25); }
.nav-item.active.s-accounts   { background: rgba(22,163,74,.25); }
.nav-item.active.s-home       { background: rgba(100,116,139,.2); }
.nav-icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-right: auto; font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 20px; background: rgba(255,255,255,.1); color: rgba(255,255,255,.6);
}

.sidebar-user {
  padding: 14px; border-top: 1px solid var(--sidebar-border); flex-shrink: 0;
}
.user-row { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--blue-light), var(--blue-dark));
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: #fff; font-size: 14px;
}
.user-name { font-size: 13px; font-weight: 600; color: #fff; }
.user-role { font-size: 11px; color: rgba(255,255,255,.35); }
.logout-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px; border-radius: 7px; background: rgba(239,68,68,.1); color: #fca5a5;
  border: 1px solid rgba(239,68,68,.2); cursor: pointer; font-size: 12px; font-weight: 600;
  margin-top: 10px; width: 100%; font-family: inherit; transition: background .2s;
}
.logout-btn:hover { background: rgba(239,68,68,.2); }

.sidebar-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 199;
}
.sidebar-overlay.show { display: block; }

/* Topbar */
.topbar {
  position: fixed; top: 0; right: 240px; left: 0; height: 60px;
  background: var(--bg-topbar); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; z-index: 100; box-shadow: var(--shadow);
  transition: background .3s, border-color .3s;
}
.topbar-left  { display: flex; align-items: center; gap: 12px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-title { font-size: 17px; font-weight: 700; color: var(--text-main); }
.topbar-date  { font-size: 12px; color: var(--text-light); }
.hamburger {
  display: none; background: none; border: none; font-size: 22px;
  cursor: pointer; color: var(--text-muted); padding: 5px 8px; border-radius: 7px;
}
.hamburger:hover { background: var(--bg-thead); }
.theme-toggle {
  width: 38px; height: 38px; border-radius: 9px; background: var(--bg-thead);
  border: 1px solid var(--border); cursor: pointer; font-size: 17px;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s; color: var(--text-muted);
}
.theme-toggle:hover { background: var(--blue-pale); color: var(--blue); }
.badge {
  display: inline-flex; align-items: center; padding: 3px 10px;
  border-radius: 20px; font-size: 11px; font-weight: 700;
}
.badge-gray    { background: rgba(100,116,139,.15); color: var(--text-muted); }
.badge-blue    { background: rgba(59,130,246,.15);  color: var(--blue-light); }
.badge-factory    { background: rgba(234,88,12,.15);  color: var(--factory); }
.badge-marketing  { background: rgba(124,58,237,.15); color: var(--marketing); }
.badge-accounting { background: rgba(37,99,235,.15);  color: var(--accounting); }
.badge-accounts   { background: rgba(22,163,74,.15);  color: var(--accounts); }

/* Page */
.page-wrap { margin-right: 240px; margin-top: 60px; padding: 24px; min-height: calc(100vh - 60px); }

/* ══════════════════════════════════════ COMPONENTS ══════════════════════════════════════ */
.card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
  box-shadow: var(--shadow); transition: background .3s, border-color .3s; margin-bottom: 20px;
}
.card-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 15px; font-weight: 700; color: var(--text-main); }
.card-body  { padding: 20px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .15s; font-family: inherit; white-space: nowrap;
}
.btn-primary { background: linear-gradient(135deg, var(--blue-light), var(--blue-dark)); color: #fff; box-shadow: 0 2px 8px rgba(37,99,235,.3); }
.btn-primary:hover { opacity: .9; }
.btn-secondary { background: var(--bg-card); color: var(--blue); border: 1.5px solid var(--blue-border); }
.btn-secondary:hover { background: var(--blue-pale); }
.btn-sm  { padding: 6px 12px; font-size: 12px; }
.btn-icon{ padding: 7px 9px; }
.btn-danger { background: rgba(220,38,38,.08); color: var(--red); border: 1px solid rgba(220,38,38,.2); }
.btn-danger:hover { background: rgba(220,38,38,.18); }

.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px; flex-wrap: wrap; gap: 12px;
}
.page-title { font-size: 20px; font-weight: 800; color: var(--text-main); }
.page-sub   { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-icon  { font-size: 56px; margin-bottom: 14px; line-height: 1; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
.empty-sub   { font-size: 13px; color: var(--text-light); }

/* Table */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead th { background: var(--bg-thead); color: var(--text-muted); font-weight: 700; padding: 11px 14px; text-align: right; border-bottom: 2px solid var(--border); white-space: nowrap; }
tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text-main); }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--bg-hover); }
.td-num  { font-weight: 700; }
.td-pos  { color: var(--green); font-weight: 700; }
.td-neg  { color: var(--red);   font-weight: 700; }
.td-zero { color: var(--text-light); }

/* Modal */
.modal-bg {
  position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center; padding: 16px;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-box {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
  width: 100%; max-width: 520px; box-shadow: var(--shadow-lg);
  animation: slideUp .15s ease; max-height: 90vh; display: flex; flex-direction: column;
}
.modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 700; color: var(--text-main); flex-shrink: 0; }
.modal-close { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text-muted); padding: 4px 7px; border-radius: 6px; line-height: 1; }
.modal-close:hover { background: var(--bg-thead); color: var(--red); }
.modal-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; }
.form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

/* Toast */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 10px;
  font-size: 14px; font-weight: 600; z-index: 9999;
  box-shadow: 0 4px 16px rgba(0,0,0,.3); transition: opacity .3s; opacity: 0;
  pointer-events: none;
}

/* ══════════════════════════════════════ DASHBOARD ══════════════════════════════════════ */
.sections-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;
}
.section-card {
  border-radius: 18px; padding: 28px; cursor: pointer;
  position: relative; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  border: 2px solid transparent;
  display: flex; flex-direction: column; gap: 16px; min-height: 200px;
}
.section-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.section-card.s-factory    { background: var(--factory-pale);    border-color: var(--factory-border); }
.section-card.s-marketing  { background: var(--marketing-pale);  border-color: var(--marketing-border); }
.section-card.s-accounting { background: var(--accounting-pale); border-color: var(--accounting-border); }
.section-card.s-accounts   { background: var(--accounts-pale);   border-color: var(--accounts-border); }
.sc-icon {
  width: 56px; height: 56px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center; font-size: 26px;
  flex-shrink: 0;
}
.s-factory    .sc-icon { background: rgba(234,88,12,.15); }
.s-marketing  .sc-icon { background: rgba(124,58,237,.15); }
.s-accounting .sc-icon { background: rgba(37,99,235,.15); }
.s-accounts   .sc-icon { background: rgba(22,163,74,.15); }
.sc-body { flex: 1; }
.sc-title { font-size: 19px; font-weight: 800; margin-bottom: 6px; }
.s-factory    .sc-title { color: var(--factory); }
.s-marketing  .sc-title { color: var(--marketing); }
.s-accounting .sc-title { color: var(--accounting); }
.s-accounts   .sc-title { color: var(--accounts); }
.sc-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
.sc-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 14px; border-top: 1px solid var(--border);
}
.sc-stats { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; }
.sc-stat strong { color: var(--text-main); }
.sc-arrow {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: transform .2s;
}
.section-card:hover .sc-arrow { transform: translateX(-4px); }
.s-factory    .sc-arrow { background: rgba(234,88,12,.12);  color: var(--factory); }
.s-marketing  .sc-arrow { background: rgba(124,58,237,.12); color: var(--marketing); }
.s-accounting .sc-arrow { background: rgba(37,99,235,.12);  color: var(--accounting); }
.s-accounts   .sc-arrow { background: rgba(22,163,74,.12);  color: var(--accounts); }

/* Section page strip */
.section-strip {
  border-radius: 14px; padding: 20px 24px;
  display: flex; align-items: center; gap: 16px; margin-bottom: 22px;
}
.s-factory    .section-strip,
.section-strip.s-factory    { background: var(--factory-pale);    border: 2px solid var(--factory-border); }
.s-marketing  .section-strip,
.section-strip.s-marketing  { background: var(--marketing-pale);  border: 2px solid var(--marketing-border); }
.s-accounting .section-strip,
.section-strip.s-accounting { background: var(--accounting-pale); border: 2px solid var(--accounting-border); }
.s-accounts   .section-strip,
.section-strip.s-accounts   { background: var(--accounts-pale);   border: 2px solid var(--accounts-border); }
.strip-icon { font-size: 32px; }
.strip-title { font-size: 20px; font-weight: 800; }
.strip-sub   { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.s-factory    .strip-title { color: var(--factory); }
.s-marketing  .strip-title { color: var(--marketing); }
.s-accounting .strip-title { color: var(--accounting); }
.s-accounts   .strip-title { color: var(--accounts); }

/* Sub-module grid */
.sub-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.sub-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; display: flex; flex-direction: column; align-items: center;
  gap: 10px; cursor: pointer; text-align: center;
  transition: all .2s;
}
.sub-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.sub-card-icon  { font-size: 28px; }
.sub-card-label { font-size: 14px; font-weight: 700; color: var(--text-main); }
.sub-card-count { font-size: 11px; color: var(--text-muted); }
.sub-card-add {
  border: 2px dashed var(--border); background: transparent; color: var(--text-muted);
}
.sub-card-add:hover { border-color: var(--blue-light); color: var(--blue); background: var(--blue-pale); box-shadow: none; transform: none; }

/* ══════════════════════════════════════ RESPONSIVE ══════════════════════════════════════ */
@media (max-width: 900px)  { .sub-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 768px)  {
  .sidebar { transform: translateX(100%); }
  .sidebar.open { transform: translateX(0); }
  .topbar { right: 0; }
  .page-wrap { margin-right: 0; padding: 16px; }
  .hamburger { display: flex; }
  .sections-grid { grid-template-columns: 1fr; gap: 14px; }
  .section-card { min-height: auto; padding: 22px; }
}
@media (max-width: 480px) {
  .sub-grid { grid-template-columns: 1fr 1fr; }
  .login-box { padding: 28px 20px; }
}
/* Print */
@media print { .sidebar, .topbar, .hamburger, .sidebar-overlay, .no-print { display: none !important; } .page-wrap { margin: 0 !important; } }
</style>
</head>
<body>

<!-- ══════════════════════ LOGIN ══════════════════════ -->
<div id="loginPage" style="display:flex">
  <button class="login-theme-btn" onclick="toggleTheme()">
    <span id="themeIcon">🌙</span> <span id="themeLabel">الوضع الليلي</span>
  </button>
  <div class="login-box">
    <div class="login-logo-row">
      <div class="login-dot"></div><div class="login-dot"></div>
      <div class="login-dot"></div><div class="login-dot"></div>
    </div>
    <div class="login-title">نظام كندة</div>
    <div class="login-sub">المصنع · التسويق · المحاسبة · الحسابات</div>
    <div class="form-group">
      <label class="form-label">اسم المستخدم</label>
      <input type="text" id="loginUser" class="form-input" placeholder="أدخل اسم المستخدم" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input type="password" id="loginPass" class="form-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">دخول</button>
    <div class="login-error" id="loginError">اسم المستخدم أو كلمة المرور غير صحيحة</div>
    <div class="quick-login">
      <div class="quick-login-title">دخول سريع</div>
      <div class="quick-btns">
        <button class="q-btn" onclick="quickLogin('admin','admin123')">👑 مدير</button>
        <button class="q-btn" onclick="quickLogin('accountant','acc123')">📝 محاسب</button>
        <button class="q-btn" onclick="quickLogin('viewer','view123')">👁 مشاهد</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════ APP ══════════════════════ -->
<div id="appShell" style="display:none">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-dots">
        <div class="brand-dot d-factory"></div>
        <div class="brand-dot d-marketing"></div>
        <div class="brand-dot d-accounting"></div>
        <div class="brand-dot d-accounts"></div>
      </div>
      <div>
        <div class="brand-name">نظام كندة</div>
        <div class="brand-sub" id="sidebarCompany">شركة كندة للتجارة</div>
      </div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section">الرئيسية</div>
      <div class="nav-item s-home active" data-p="home" onclick="goPage('home')">
        <span class="nav-icon">🏠</span>الرئيسية
      </div>

      <div class="nav-section" style="color:var(--factory);opacity:.8">المصنع</div>
      <div class="nav-item s-factory" data-p="factory" onclick="goPage('factory')">
        <span class="nav-icon">🏭</span>قسم المصنع
        <span class="nav-badge" id="nb-factory">0</span>
      </div>

      <div class="nav-section" style="color:var(--marketing);opacity:.8">التسويق</div>
      <div class="nav-item s-marketing" data-p="marketing" onclick="goPage('marketing')">
        <span class="nav-icon">📣</span>قسم التسويق
        <span class="nav-badge" id="nb-marketing">0</span>
      </div>

      <div class="nav-section" style="color:var(--accounting);opacity:.8">المحاسبة</div>
      <div class="nav-item s-accounting" data-p="accounting" onclick="goPage('accounting')">
        <span class="nav-icon">📒</span>قسم المحاسبة
        <span class="nav-badge" id="nb-accounting">0</span>
      </div>

      <div class="nav-section" style="color:var(--accounts);opacity:.8">الحسابات</div>
      <div class="nav-item s-accounts" data-p="accounts" onclick="goPage('accounts')">
        <span class="nav-icon">💰</span>قسم الحسابات
        <span class="nav-badge" id="nb-accounts">0</span>
      </div>

      <div class="nav-section">الإدارة</div>
      <div class="nav-item s-home" id="settingsNav" data-p="settings" onclick="goPage('settings')">
        <span class="nav-icon">⚙️</span>الإعدادات
      </div>
    </div>

    <div class="sidebar-user">
      <div class="user-row">
        <div class="user-avatar" id="uAvatar">م</div>
        <div>
          <div class="user-name" id="uName">—</div>
          <div class="user-role" id="uRole">—</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">🚪 تسجيل الخروج</button>
    </div>
  </nav>

  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div>
        <div class="topbar-title" id="topbarTitle">الرئيسية</div>
        <div class="topbar-date"  id="topbarDate"></div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="theme-toggle" onclick="toggleTheme()"><span id="topThemeIcon">🌙</span></button>
      <span class="badge badge-gray" id="topbarRole">—</span>
    </div>
  </header>

  <main class="page-wrap"><div id="pc"></div></main>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════
// STORAGE
// ══════════════════════════════════════
const DB = {
  get:    (k, d=[]) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },
  set:    (k, v)    => localStorage.setItem(k, JSON.stringify(v)),
  obj:    (k)       => { try { return JSON.parse(localStorage.getItem(k)) ?? {}; } catch { return {}; } },
  setObj: (k, v)    => localStorage.setItem(k, JSON.stringify(v)),
};

const K = {
  users:    'kinda_users',
  session:  'kinda_session',
  settings: 'kinda_settings',
  theme:    'kinda_theme',
  // Factory
  f_products:  'kinda_f_products',
  f_purchases: 'kinda_f_purchases',
  f_pur_items: 'kinda_f_pur_items',
  f_production:'kinda_f_production',
  // Marketing
  m_reps:       'kinda_m_reps',
  m_dists:      'kinda_m_dists',
  m_dist_items: 'kinda_m_dist_items',
  m_sales:      'kinda_m_sales',
  m_sale_items: 'kinda_m_sale_items',
  // Accounting
  a_journal:    'kinda_a_journal',
  a_jlines:     'kinda_a_jlines',
  // Accounts
  ac_cash:      'kinda_ac_cash',
  ac_bank:      'kinda_ac_bank',
  ac_contacts:  'kinda_ac_contacts',
  ac_ctxns:     'kinda_ac_ctxns',
};

// ══════════════════════════════════════
// SEED
// ══════════════════════════════════════
function seed() {
  if (localStorage.getItem('kinda_seeded_v1')) return;
  DB.set(K.users, [
    { id:1, username:'admin',      password:'admin123', fullName:'مدير النظام', role:'ADMIN' },
    { id:2, username:'accountant', password:'acc123',   fullName:'المحاسب',     role:'ACCOUNTANT' },
    { id:3, username:'viewer',     password:'view123',  fullName:'مشاهد',        role:'VIEWER' },
  ]);
  Object.keys(K).filter(k=>k!=='users'&&k!=='session'&&k!=='settings'&&k!=='theme')
    .forEach(k => { if (!localStorage.getItem(K[k])) DB.set(K[k], []); });
  localStorage.setItem('kinda_seeded_v1','1');
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function fmt(n)    { return Number(n||0).toLocaleString('ar-LY',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ if(!d)return''; const[y,m,day]=String(d).split('-'); return`${day}/${m}/${y}`; }
function today()   { return new Date().toISOString().split('T')[0]; }
function genId()   { return Date.now()+Math.floor(Math.random()*9999); }
function esc(s)    { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function arabicNow(){ return new Date().toLocaleDateString('ar-LY',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
function nc(n)     { return n>0?'td-pos':n<0?'td-neg':'td-zero'; }

const ROLE_LABEL = { ADMIN:'مدير', ACCOUNTANT:'محاسب', VIEWER:'مشاهد' };

// ══════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════
function getSettings()       { return DB.obj(K.settings); }
function getSetting(k,def='') { return getSettings()[k]??def; }
function saveSettings(obj)   { DB.setObj(K.settings,{...getSettings(),...obj}); applySettings(); }
function applySettings() {
  const name = getSetting('companyName','شركة كندة للتجارة');
  document.querySelectorAll('.dyn-company').forEach(el=>el.textContent=name);
  const sb = document.getElementById('sidebarCompany'); if(sb) sb.textContent=name;
  document.title = getSetting('appTitle','نظام كندة');
}

// ══════════════════════════════════════
// THEME
// ══════════════════════════════════════
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme',t);
  const dark = t==='dark';
  ['themeIcon','topThemeIcon'].forEach(id=>{ const el=document.getElementById(id); if(el)el.textContent=dark?'☀️':'🌙'; });
  const lbl=document.getElementById('themeLabel'); if(lbl)lbl.textContent=dark?'الوضع النهاري':'الوضع الليلي';
  localStorage.setItem(K.theme,t);
}
function toggleTheme() { applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); }

// ══════════════════════════════════════
// SESSION
// ══════════════════════════════════════
function getSession()  { const s=DB.obj(K.session); if(!s.id)return null; if(s.exp&&Date.now()>s.exp){DB.setObj(K.session,{});return null;} return s; }
function setSession(u) { DB.setObj(K.session,{id:u.id,username:u.username,fullName:u.fullName,role:u.role,exp:Date.now()+8*3600000}); }
function clearSession(){ DB.setObj(K.session,{}); }
function canEdit()     { const s=getSession(); return s&&s.role!=='VIEWER'; }
function isAdmin()     { const s=getSession(); return s&&s.role==='ADMIN'; }

// ══════════════════════════════════════
// AUTH
// ══════════════════════════════════════
function quickLogin(u,p){ document.getElementById('loginUser').value=u; document.getElementById('loginPass').value=p; doLogin(); }
function doLogin() {
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginError');
  const user=DB.get(K.users).find(x=>x.username===u&&x.password===p);
  if(user){ setSession(user); err.style.display='none'; bootApp(); }
  else    { err.style.display='block'; document.getElementById('loginPass').value=''; document.getElementById('loginPass').focus(); }
}
function doLogout() {
  clearSession();
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}
function bootApp() {
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appShell').style.display='block';
  const s=getSession();
  document.getElementById('uAvatar').textContent=(s.fullName||'م').charAt(0);
  document.getElementById('uName').textContent=s.fullName;
  document.getElementById('uRole').textContent=ROLE_LABEL[s.role]||s.role;
  document.getElementById('topbarRole').textContent=ROLE_LABEL[s.role]||s.role;
  document.getElementById('topbarDate').textContent=arabicNow();
  const adminOnly = document.getElementById('settingsNav');
  if(adminOnly) adminOnly.style.display = isAdmin()?'':'none';
  applySettings();
  updateNavBadges();
  goPage('home');
}

// ══════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }

function updateNavBadges() {
  const badges = {
    'factory':    DB.get(K.f_products).length + DB.get(K.f_purchases).length,
    'marketing':  DB.get(K.m_reps).length + DB.get(K.m_sales).length,
    'accounting': DB.get(K.a_journal).length,
    'accounts':   DB.get(K.ac_cash).length + DB.get(K.ac_bank).length + DB.get(K.ac_contacts).length,
  };
  Object.entries(badges).forEach(([k,v])=>{ const el=document.getElementById(`nb-${k}`); if(el)el.textContent=v||''; });
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
const PAGE_TITLES = {
  home:'الرئيسية', factory:'قسم المصنع', marketing:'قسم التسويق',
  accounting:'قسم المحاسبة', accounts:'قسم الحسابات', settings:'الإعدادات',
};

function goPage(page, params={}) {
  closeSidebar();
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active', el.dataset.p===page));
  document.getElementById('topbarTitle').textContent = PAGE_TITLES[page]||page;
  const pc = document.getElementById('pc');
  switch(page) {
    case 'home':       pc.innerHTML = renderHome(); break;
    case 'factory':    pc.innerHTML = renderSection('factory',   params); break;
    case 'marketing':  pc.innerHTML = renderSection('marketing', params); break;
    case 'accounting': pc.innerHTML = renderSection('accounting',params); break;
    case 'accounts':   pc.innerHTML = renderSection('accounts',  params); break;
    case 'settings':   pc.innerHTML = renderSettings(); break;
    default:           pc.innerHTML = renderComingSoon(page); break;
  }
  updateNavBadges();
}

// ══════════════════════════════════════
// HOME (DASHBOARD)
// ══════════════════════════════════════
function renderHome() {
  const s = getSession();
  const sections = [
    {
      key:'factory', cls:'s-factory', icon:'🏭', title:'المصنع',
      desc:'إدارة المنتجات، شراء المواد الخام، وتتبع الإنتاج من المصنع.',
      stats:[
        {label:'المنتجات', val: DB.get(K.f_products).length},
        {label:'فواتير الشراء', val: DB.get(K.f_purchases).length},
      ]
    },
    {
      key:'marketing', cls:'s-marketing', icon:'📣', title:'التسويق',
      desc:'إدارة المسوقين وتوزيع البضاعة وتسجيل عمليات البيع الميداني.',
      stats:[
        {label:'المسوقون', val: DB.get(K.m_reps).length},
        {label:'فواتير البيع', val: DB.get(K.m_sales).length},
      ]
    },
    {
      key:'accounting', cls:'s-accounting', icon:'📒', title:'المحاسبة',
      desc:'القيود المحاسبية، ميزان المراجعة، والتقارير المالية.',
      stats:[
        {label:'القيود', val: DB.get(K.a_journal).length},
        {label:'السنة المالية', val: new Date().getFullYear()},
      ]
    },
    {
      key:'accounts', cls:'s-accounts', icon:'💰', title:'الحسابات',
      desc:'الخزينة، المصرف، حسابات العملاء والموردين والأرصدة.',
      stats:[
        {label:'الخزينة', val: fmt(DB.get(K.ac_cash).reduce((s,r)=>s+(r.inAmt||0)-(r.outAmt||0),0))},
        {label:'المصرف', val:  fmt(DB.get(K.ac_bank).reduce((s,r)=>s+(r.inAmt||0)-(r.outAmt||0),0))},
      ]
    },
  ];

  return `
  <div style="background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-page) 100%);border-radius:16px;padding:24px 28px;margin-bottom:24px;border:1px solid var(--border)">
    <div style="font-size:22px;font-weight:800;color:var(--text-main);margin-bottom:4px">
      مرحباً، ${esc(s?.fullName||'')} 👋
    </div>
    <div style="font-size:13px;color:var(--text-muted)">${arabicNow()}</div>
    <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
      <div style="background:var(--factory-pale);border:1px solid var(--factory-border);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--factory)">🏭 المصنع</div>
      <div style="background:var(--marketing-pale);border:1px solid var(--marketing-border);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--marketing)">📣 التسويق</div>
      <div style="background:var(--accounting-pale);border:1px solid var(--accounting-border);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--accounting)">📒 المحاسبة</div>
      <div style="background:var(--accounts-pale);border:1px solid var(--accounts-border);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--accounts)">💰 الحسابات</div>
    </div>
  </div>

  <div class="sections-grid">
    ${sections.map(sec=>`
    <div class="section-card ${sec.cls}" onclick="goPage('${sec.key}')">
      <div style="display:flex;align-items:flex-start;gap:14px">
        <div class="sc-icon">${sec.icon}</div>
        <div class="sc-body">
          <div class="sc-title">${sec.title}</div>
          <div class="sc-desc">${sec.desc}</div>
        </div>
      </div>
      <div class="sc-footer">
        <div class="sc-stats">
          ${sec.stats.map(st=>`<span>${st.label}: <strong>${st.val}</strong></span>`).join('')}
        </div>
        <div class="sc-arrow">←</div>
      </div>
    </div>`).join('')}
  </div>`;
}

// ══════════════════════════════════════
// SECTION PAGES
// ══════════════════════════════════════
const SECTION_META = {
  factory: {
    cls:'s-factory', icon:'🏭', title:'المصنع', color:'var(--factory)',
    modules:[
      {key:'f_products',  icon:'📦', label:'المنتجات',      count:()=>DB.get(K.f_products).length,  page:'f_products'},
      {key:'f_purchases', icon:'🛒', label:'مشتريات المواد', count:()=>DB.get(K.f_purchases).length, page:'f_purchases'},
      {key:'f_production',icon:'⚙️', label:'سجل الإنتاج',   count:()=>DB.get(K.f_production).length,page:'f_production'},
    ]
  },
  marketing: {
    cls:'s-marketing', icon:'📣', title:'التسويق', color:'var(--marketing)',
    modules:[
      {key:'m_reps',  icon:'👥', label:'المسوقون',       count:()=>DB.get(K.m_reps).length,  page:'m_reps'},
      {key:'m_dists', icon:'🚚', label:'توزيع البضاعة',  count:()=>DB.get(K.m_dists).length, page:'m_dists'},
      {key:'m_sales', icon:'🧾', label:'فواتير البيع',   count:()=>DB.get(K.m_sales).length, page:'m_sales'},
    ]
  },
  accounting: {
    cls:'s-accounting', icon:'📒', title:'المحاسبة', color:'var(--accounting)',
    modules:[
      {key:'a_journal', icon:'📝', label:'القيود المحاسبية', count:()=>DB.get(K.a_journal).length, page:'a_journal'},
      {key:'a_trial',   icon:'📊', label:'ميزان المراجعة',   count:()=>0,                          page:'a_trial'},
      {key:'a_reports', icon:'📈', label:'التقارير المالية', count:()=>0,                          page:'a_reports'},
    ]
  },
  accounts: {
    cls:'s-accounts', icon:'💰', title:'الحسابات', color:'var(--accounts)',
    modules:[
      {key:'ac_cash',     icon:'💵', label:'الخزينة',    count:()=>DB.get(K.ac_cash).length,     page:'ac_cash'},
      {key:'ac_bank',     icon:'🏦', label:'المصرف',     count:()=>DB.get(K.ac_bank).length,     page:'ac_bank'},
      {key:'ac_contacts', icon:'👤', label:'أصحاب الحسابات', count:()=>DB.get(K.ac_contacts).length, page:'ac_contacts'},
    ]
  },
};

function renderSection(key, params) {
  const meta = SECTION_META[key];
  if (!meta) return renderComingSoon(key);

  return `
  <div class="section-strip ${meta.cls}">
    <div class="strip-icon">${meta.icon}</div>
    <div>
      <div class="strip-title">${meta.title}</div>
      <div class="strip-sub">اختر وحدة للبدء</div>
    </div>
  </div>

  <div class="sub-grid">
    ${meta.modules.map(m=>`
    <div class="sub-card" onclick="goPage('${m.page}')">
      <div class="sub-card-icon">${m.icon}</div>
      <div class="sub-card-label">${m.label}</div>
      <div class="sub-card-count">${m.count()} سجل</div>
    </div>`).join('')}
    ${canEdit()?`
    <div class="sub-card sub-card-add" onclick="showAddModuleHint('${key}')">
      <div class="sub-card-icon">➕</div>
      <div class="sub-card-label">وحدة جديدة</div>
      <div class="sub-card-count">قريباً</div>
    </div>`:''}
  </div>`;
}

function showAddModuleHint(key) {
  showToast('سيتم بناء الوحدات الجديدة قريباً');
}

// ══════════════════════════════════════
// MODULE PAGES (Coming Soon stubs)
// ══════════════════════════════════════
const MODULE_META = {
  f_products:  { section:'factory',    icon:'📦', title:'المنتجات',            color:'var(--factory)' },
  f_purchases: { section:'factory',    icon:'🛒', title:'مشتريات المواد الخام',color:'var(--factory)' },
  f_production:{ section:'factory',    icon:'⚙️', title:'سجل الإنتاج',        color:'var(--factory)' },
  m_reps:      { section:'marketing',  icon:'👥', title:'المسوقون',            color:'var(--marketing)' },
  m_dists:     { section:'marketing',  icon:'🚚', title:'توزيع البضاعة',      color:'var(--marketing)' },
  m_sales:     { section:'marketing',  icon:'🧾', title:'فواتير البيع',        color:'var(--marketing)' },
  a_journal:   { section:'accounting', icon:'📝', title:'القيود المحاسبية',   color:'var(--accounting)' },
  a_trial:     { section:'accounting', icon:'📊', title:'ميزان المراجعة',     color:'var(--accounting)' },
  a_reports:   { section:'accounting', icon:'📈', title:'التقارير المالية',   color:'var(--accounting)' },
  ac_cash:     { section:'accounts',   icon:'💵', title:'الخزينة',            color:'var(--accounts)' },
  ac_bank:     { section:'accounts',   icon:'🏦', title:'المصرف',             color:'var(--accounts)' },
  ac_contacts: { section:'accounts',   icon:'👤', title:'أصحاب الحسابات',    color:'var(--accounts)' },
};

function renderComingSoon(page) {
  const m = MODULE_META[page];
  if (!m) return `<div class="card"><div class="card-body"><div class="empty-state"><div class="empty-icon">🔧</div><div class="empty-title">قيد الإنشاء</div></div></div></div>`;
  const sectionMeta = SECTION_META[m.section];
  return `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
    <button class="btn btn-secondary btn-sm" onclick="goPage('${m.section}')">← ${sectionMeta.title}</button>
  </div>
  <div style="text-align:center;padding:60px 20px 80px">
    <div style="font-size:72px;margin-bottom:20px;line-height:1">${m.icon}</div>
    <div style="font-size:24px;font-weight:800;color:${m.color};margin-bottom:10px">${m.title}</div>
    <div style="font-size:14px;color:var(--text-muted);max-width:360px;margin:0 auto;line-height:1.7">
      هذه الوحدة قيد البناء. سيتم إضافة الوظائف الكاملة لها قريباً بشكل تدريجي.
    </div>
    <div style="margin-top:28px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="goPage('${m.section}')">← العودة للقسم</button>
      <button class="btn btn-primary" onclick="showToast('سيتم بناء هذه الوحدة قريباً ✅')">طلب بناء الوحدة</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════
function renderSettings() {
  const s = getSettings();
  return `
  <div class="page-header">
    <div><div class="page-title">⚙️ الإعدادات</div><div class="page-sub">إعدادات النظام العامة</div></div>
  </div>
  <div class="card" style="max-width:560px">
    <div class="card-header"><span class="card-title">🏢 معلومات الشركة</span></div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:16px">
      <div class="form-group" style="margin:0">
        <label class="form-label">اسم التطبيق</label>
        <input type="text" id="st_title" class="form-input" value="${esc(s.appTitle||'نظام كندة')}" placeholder="نظام كندة">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">اسم الشركة</label>
        <input type="text" id="st_company" class="form-input" value="${esc(s.companyName||'شركة كندة للتجارة')}" placeholder="شركة كندة للتجارة">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">رقم الهاتف</label>
        <input type="text" id="st_phone" class="form-input" value="${esc(s.phone||'')}" placeholder="رقم الهاتف" dir="ltr">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">العنوان</label>
        <input type="text" id="st_address" class="form-input" value="${esc(s.address||'')}" placeholder="عنوان الشركة">
      </div>
      <button class="btn btn-primary" style="align-self:flex-start" onclick="saveSettingsForm()">💾 حفظ</button>
    </div>
  </div>

  <div class="card" style="max-width:560px">
    <div class="card-header"><span class="card-title">👤 إدارة المستخدمين</span></div>
    <div class="card-body">
      ${renderUsersTable()}
    </div>
  </div>`;
}

function renderUsersTable() {
  const users = DB.get(K.users);
  return `<div class="tbl-wrap"><table>
    <thead><tr><th>المستخدم</th><th>الاسم الكامل</th><th>الدور</th><th>إجراءات</th></tr></thead>
    <tbody>${users.map(u=>`<tr>
      <td style="font-weight:700;direction:ltr">${esc(u.username)}</td>
      <td>${esc(u.fullName)}</td>
      <td><span class="badge badge-gray">${ROLE_LABEL[u.role]||u.role}</span></td>
      <td><button class="btn btn-secondary btn-sm btn-icon" onclick="openUserModal(${u.id})">✏️</button></td>
    </tr>`).join('')}</tbody>
  </table></div>
  <button class="btn btn-secondary btn-sm" style="margin-top:12px" onclick="openUserModal(null)">+ إضافة مستخدم</button>
  <div id="userModalWrap"></div>`;
}

function openUserModal(id) {
  const u = id ? DB.get(K.users).find(x=>x.id===id) : null;
  const wrap = document.getElementById('userModalWrap');
  wrap.innerHTML = `
  <div class="modal-bg" onclick="closeUserModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-head">
        <span>${u?'تعديل':'إضافة'} مستخدم</span>
        <button class="modal-close" onclick="closeUserModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">اسم المستخدم *</label>
            <input type="text" id="u_username" class="form-input" value="${esc(u?.username||'')}" placeholder="username" dir="ltr">
          </div>
          <div class="form-group">
            <label class="form-label">كلمة المرور *</label>
            <input type="text" id="u_pass" class="form-input" value="${esc(u?.password||'')}" placeholder="password" dir="ltr">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">الاسم الكامل *</label>
            <input type="text" id="u_name" class="form-input" value="${esc(u?.fullName||'')}" placeholder="الاسم">
          </div>
          <div class="form-group">
            <label class="form-label">الدور *</label>
            <select id="u_role" class="form-input">
              <option value="ADMIN"      ${(!u||u.role==='ADMIN')?'selected':''}>مدير</option>
              <option value="ACCOUNTANT" ${u?.role==='ACCOUNTANT'?'selected':''}>محاسب</option>
              <option value="VIEWER"     ${u?.role==='VIEWER'?'selected':''}>مشاهد</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        ${u&&u.id!==1?`<button class="btn btn-danger" onclick="deleteUser(${u.id})" style="margin-left:auto">🗑 حذف</button>`:''}
        <button class="btn btn-secondary" onclick="closeUserModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveUser(${id||'null'})">💾 حفظ</button>
      </div>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('u_username')?.focus(),50);
}

function closeUserModal() { const el=document.getElementById('userModalWrap'); if(el)el.innerHTML=''; }

function saveUser(id) {
  const username = document.getElementById('u_username').value.trim();
  const pass     = document.getElementById('u_pass').value.trim();
  const fullName = document.getElementById('u_name').value.trim();
  const role     = document.getElementById('u_role').value;
  if (!username||!pass||!fullName) { alert('يرجى ملء جميع الحقول'); return; }
  let users = DB.get(K.users);
  if (id) { users=users.map(u=>u.id===id?{...u,username,password:pass,fullName,role}:u); }
  else    { users.push({id:genId(),username,password:pass,fullName,role}); }
  DB.set(K.users,users);
  closeUserModal();
  goPage('settings');
  showToast('✅ تم الحفظ');
}

function deleteUser(id) {
  if (id===1) { alert('لا يمكن حذف المدير الرئيسي'); return; }
  if (!confirm('حذف هذا المستخدم؟')) return;
  DB.set(K.users, DB.get(K.users).filter(u=>u.id!==id));
  closeUserModal();
  goPage('settings');
  showToast('🗑 تم الحذف');
}

function saveSettingsForm() {
  const title   = document.getElementById('st_title').value.trim();
  const company = document.getElementById('st_company').value.trim();
  const phone   = document.getElementById('st_phone').value.trim();
  const address = document.getElementById('st_address').value.trim();
  if (!title||!company) { alert('يرجى ملء اسم التطبيق واسم الشركة'); return; }
  saveSettings({appTitle:title, companyName:company, phone, address});
  showToast('✅ تم حفظ الإعدادات');
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.opacity='0',2600);
}

// ══════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════
document.addEventListener('keydown', e=>{
  if (e.key==='Enter' && document.getElementById('loginPage').style.display!=='none') doLogin();
});

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
seed();
applyTheme(localStorage.getItem(K.theme)||'light');
const _s = getSession();
if (_s) bootApp();
else { document.getElementById('loginPage').style.display='flex'; document.getElementById('appShell').style.display='none'; }
</script>
</body>
</html>
