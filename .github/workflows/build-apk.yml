name: Build Alcamp APK

on:
  push:
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x android-app/gradlew

      - name: Build Release APK
        run: |
          cd android-app
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv android-app/app/build/outputs/apk/release/app-release*.apk \
             android-app/app/build/outputs/apk/release/Alcamp.apk

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: Alcamp-APK
          path: android-app/app/build/outputs/apk/release/Alcamp.apk
          retention-days: 30

      - name: Publish APK as direct download (no zip)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: "Latest APK — ALCAMP"
          body: "آخر إصدار من تطبيق ALCAMP — رابط تحميل مباشر بدون ضغط"
          files: android-app/app/build/outputs/apk/release/Alcamp.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
